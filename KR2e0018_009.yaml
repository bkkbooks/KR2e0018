body:
  text: 錢塘遺事卷九元劉一清撰丙子北狩祈請使左相吳堅天台人右相賈餘慶海州人參政劉岊重慶人樞密文天祥吉州人參政家鉉翁眉州人奉表獻璽納土官監察御史楊應奎廬州人大宗丞趙若秀臨安人日記官宗丞趙時鎮廬州人閣贊嚴光大紹興人書狀官御帶髙州太守徐用禮臨安人潮州通判吳慶月臨安人惠州通判朱仁舉闕人處州通判沈庚會闕人浙東路鈐吳嘉興闕人掌管禮物官通事總管髙舉江陵人總管吳順闕人提舉禮物官環衛總管潘應時闕人總管吳椿闕人環衛總管劉玊信揚州人掌儀官浙東路鈐詹囦闕人帶行官屬五十四員隨行人從二百四十人扛擡禮物將兵三千人北朝館伴使巴延丞相貼差特穆爾萬户阿珠元帥貼差焦愈相祈請使行程記日記官嚴光大録德祐丙子二月初九日宣奉大夫左相吳堅自天慶觀方丈出北關門送通議大夫右丞相兼樞密使賈餘慶銀青光祿大夫樞密使謝堂端明殿大學士中奉大夫充祈請使劉岊丞議郎守監察御史充奉表納土官楊應奎朝奉郎充奉表納土官趙若秀當登舟時南北朝阿里議事𫝊巴延命留吳相登舟泊于北新橋岸下終夜流涕北軍差軍前索多相公勉諭之此日會文天祥于軍前忠義激烈分辨夷夏遂激北朝丞相之怒遂㸃差堅戰頭目守之初十日樞使謝堂納賂免行遂回是夕泊謝村十四日舟次平江府北官宣撫使就閶門接官亭令妓置酒待吳文二相不赴晚催登舟馬軍三百餘人㳂塘護送至無錫縣十五日舟次無錫是日特穆爾萬户生日四府俱送壽儀就三登倉橋上特穆爾舞勸夜泊常州十里鎮十六日早舟次常州燬餘之屋無路殺死之尸滿河臭不可聞惟此最多次過奔牛鎮夜泊吕城白骨堆積如山十七日早過吕城堰換舟到丹陽縣泊七里廟十八日行過新豐市遇一舟有北朝國師劉參政舉酒勸之次至鎮江府韓蘄王廟前有招討石祖忠招討張郎中携妓樂獅豹勸酒迎入府治同特穆爾留客於府治後堂泊舟丹陽館後十九日府第率衆官渡揚子江入瓜洲見阿珠平章留宴於圗嚕萬户張郎中房子二十日阿珠元帥統諸臣從官同太皇太后續差到閣贊吳忠翊督戰孫通直賫手詔帶北朝馬數千往揚州至揚子橋炮聲連響繼至城下一炮震天城上旗幟雲擁軍船放划車弩密如雨再一炮響隂雲四合冷雨大作驟如傾盆勢不可進阿珠平章請回揚子橋茶飯罷入瓜洲草一日雨雪大作疾風驟發江濤洶湧不敢發舟再泊瓜州草二日雪霽諸使回鎮江府草三日吳閣贊孫通直阿珠平章欲命諸使親札勉揚州制置李庭芝納降衆從之獨文丞相不畫名繼而平章先索藁及諸官札成無計可達其地分各有軍馬把截時有遊騎出從夜泊舟中草四日宴于鎮江府治夜泊舟中草五日夜泊舟中草六日巴延夫人自臨安回夜泊舟中草七日夜宿舟中草八日焦僉省諸使宿鎮江州治草九日渡江夜泊舟中至夜文丞相脫去三月初一日早方知文丞相已脫去閉城三日搜覔不見收從人幹僕并管伴使千户及總管等人囚之夜泊舟中初二日宿於揚子橋圃內乘鋪馬初三日宿灣頭午前有揚州都統萬户出戰士氣百倍其鋒不可當乃退初四日過邵伯鎮徑行一堡子闊六十里北軍屯戍又有水寨屯軍甚多內有小堡子六十餘所博囉相公阿里右丞在內宰馬置酒延待諸使忽報揚州北門軍馬擁出姜才分陳殺奪交傷不少相持半日及暮博囉相公以軍馬相距而退中路遇廬州一卒云淮西廬州夏貴已於三月初三日投拜見賫降書至阿珠平章處有軍馬數十護送蓋揚州未降故也晚宿荒屋內路上尸骨如山初五日過天長縣宿荒草上坐以待旦有尸滿野初六日渡天長河無舟滿河皆腐尸夜宿荒草初七日過寶應軍初八日過招信軍至淮安界忽望見旌旗雲擁炮響震天有數隊人馬出戰矢如雨下乃許文德兵馬親臨軍陳殺傷不少特穆爾萬户集兵拒守及日晚方退夜遂移屯宿於荒草初九日過甘羅城渡清河口至清河口守渡衆官迎入軍治設宴出城宿舟中初十日舟離清河口過小清河口七里莊轉河至桃源晚宿舟中十一日宿舟中十二日宿宿遷僅有二三十家舟泊野岸十三日舟行晚宿邳州城外邳州離城逺接置酒作樂會衆官於草廬下夜舟泊圯橋子下即子房擊始皇博浪沙中副車遂逃于此子房進黃石公履即此橋也自此人皆戴笠衣冠别矣十四日換舟諸官入邳城去看風俗城壁圮頺民居草座自此經過州縣只如此晚宿野岸十五日早發淮隂屬徐州界道左有元祐間石麒麟院所立鎮碑是晚徐州府臣携酒至款諸使夜宿舟中其日乃清明諸使感懷十六日抵徐州換舟宿野岸十七日舟行午過留城少泊父老云此是漢髙祖封子房為留侯即此城是也有廟碑記在焉過九里原有缺字十八日次沛縣乃魯地也髙祖生於豐沛去沛二十里沛民聞宋朝宰相等官至家家門首焚香迎拜申牌後過雞鳴臺晚次舟河口魚臺縣昔春秋隱公五年觀魚于棠即此地也十九日舟行午至谷亭馬頭申時過魯橋有四洞水流甚急橋畔有四天王之祠晚宿魯橋二十日易行李上車屬官皆乘鋪馬酉牌抵新州夜宿縣治即濟州也草一日車行酉過汾陽即郭令公所封之地夜宿于縣治草二日車行午至東平府夜宿嚴相公家草三日東平守置酒髙會于宣聖廟聖像雄偉殿宇宏麗去宣聖墓二百里一人云墓有巨木皆三丈圍夜宿嚴相公府此處風俗甚好商旅輻輳絹帛價目十一路經過惟此為最草四日車行申抵茌平縣宿縣治草六日車行過合城鎮午過臨城鎮勝果寺有周柴世宗廟遺像存焉自東平府去村聚頗繁麥畦桑畝一望不斷晚至髙唐平原縣係趙地戰國封平原君處夜宿縣治草八日車行至陵州陵州郡守迎諸使宴畢宿州治草九日易車行陵州西關就衛河登舟午後過林鎮屬河間府有梁山伯祝英臺墓夜宿于岸三十日早行舟已抵灌縣界東光縣焦僉省置酒宴于縣治夜泊野岸閏三月初一日舟至長蘆鎮土人云小燕京蓋人煙輻輳此地産鹽有鹽運司鎮南有浮橋妓樂雜劇宴待諸使未牌舟抵興濟縣酉抵清州夜宿舟中初二日舟行過清河鎮去海不逺夜泊鎮內初三日舟過清河鎮水冀河或海風大作吹沙走石是夜宿舟中初四日早抵楊村歇于館驛焦僉省差楊村巡檢下鄉科民户辦車三十輛夜宿驛內初五日諸使宴焦僉省于馹中初六日車行午過武清縣東有孟克皇帝選命賢才牧民德政碑進士趙崇選撰夜宿州治初七日車行過王臺鎮四望桑麥青青午過分頭土人云此地甚冷五月方可養蠶麥苗長不滿三寸六月方食麥次抵德仁府此地屬漷隂縣初八日拂明諸使率官屬詣德仁府永壽寺啓建太皇壽崇聖節道場退宰執來議勘會國信取禮物已近燕京護送官吏督擡兵級併祗候人各與給犒須議指揮護送禮物官徐用禮特與轉行武功大夫帶御器械知髙州日記官嚴光大特與轉武翼郎升閣贊添差福建路馬步軍副總管福州駐劄大通事髙舉特與轉武經郎帶行環衛官添差西路副總管臨安府駐劄尚書府都事吳慶用特轉朝奉郎添差通判潮州賜緋尚寶省録事朱仁舉特轉奉議郎差通判惠州事賜緋中書省録事沈庚會特轉奉議郎差通判處州事賜緋尚書省令史陳充謙特轉宣教郎樞密院丞旨胡特轉武功郎添差浙東路兵馬鈐轄國信所掌儀詹囦轉武功郎浙東路分紹興府駐劄專庫龔友諒陸鎮各轉承信郎直省所劉某鍾應辰沈文亨鍾大有各轉承信郎陳聰姚安國石寶林恢各補進義校尉扛擡禮物節級等各有犒賞初九日甲辰過大興縣至滂村宿是日賈相病初十日馬入燕京陽春門諸色妓樂等祗候迎入會同館焦參政勸酒館內歇來逺堂賈右相家參政歇于穆賔堂右吳劉二相歇于穆賔堂左屬官分歇後堂從者分歇前兩廊此館係大金四大王府今改為驛兩廊有八十餘間酒食米菜之類專委斷事官分撥輪到各責同知排辦齊整厨子工夫等人分房祗直每日委監察御史等官覺問逐一宣問茶飯好歹賈相病甚仍宿館內十一日樞密院差軍卒數十人守館內賈相病重十二日夏貴至歇來逺之右隨行帶領將佐三百餘人都人聚觀哂之十三日樞密院差太醫診賈相脈投石膏散疾愈篤十四日賈相薨衆官大慟十五日巳時賈相自會同館後門出殯諸官出麗正門燕京大興總管府排辦神道綵亭中餘座鼓鈸幡蓋之類送至洞神觀側殯焉十七日諸使祭賈相于洞神觀十八日特穆爾萬户宴諸使十九日諸使同屬官至樞密值雨入麗正門內右手參張平章陳參政會少保夏貴端明吕師寶都統洪模并宰執屬官少保官屬同宴張平章問吳相郊祀典禮儀仗制度等事陳參政以丞相所言詳細答之席終而回二十日諸使㸃視禮物草一日巴延丞相回諸使出接有大旗書天下太平四字草三日巴延上開平府草四日諸使出陽春門迓太后嗣君於五里外起居隆國夫人王昭儀新安宫正新定安康安定夫人天眷福王沂王謝樞密從駕車大小九十三兩大小宫使六十餘人張知府濡繼至有緋緑妓樂神鬼清樂戴珠翠衣銷金乘馬旌隊鎗刀金鼓等迎接入燕京隨駕下車入中堂內垂簾而坐諸使屬官立班兩拜後班稍側又兩拜退草五日諸使訪謝樞密沂王草六日吳丞相劉參政宴謝樞密等官草七日禮物官屬食于宴樂園四月初一日諸使率屬官詣會同館起居兩宫初二日焦僉省來訪諸使初三日諸使會議祈請事宜初四日諸使宴焦僉省初五日諸使訪樞密院陳參政初六日諸使訪趙同僉初七日僉省來訪諸使初八日諸使率屬官詣長壽宫滿散崇壽聖節本觀見有一真人掌觀宫內道衆八百人初九日謝樞密沂王宴諸使初十日中寶訪諸使議赴上都日子十二日諸使及官屬乘鋪馬出通𤣥門晚抵昌平站自此以往步步皆沙漠之地省院諸色人㸃差一甲隨行餘留燕京十三日車馬行晚宿榆林站是日過隘口十四日車行晚宿懷來站十五日晚宿洪站是日太后嗣君福王沂王謝樞密離燕京亦赴上都十六日離洪站十里到雲州無城一閧人家至州二十里地名龜門山峭壁對峙有神靈甚晚宿鵰巢站十七日車馬行晚宿獨石站自昌平站至獨石站亡牆草塵皆是漢兒官人管待名漢兒站十八日宿牛羣站此去皆草地此乃韃靼家官人管待名韃靼站並無房子只是氊帳韃靼人多喫馬牛乳羊酪少喫飯飢則食肉路中每十里一急遞鋪九州自此通路去十九日晚宿明安站有床帳無人家二十日宿凉亭站亦無人家無水可喫取水于十里外只燒馬糞草一日宿李三站無人家草二日車馬行四十里至上都開平府入昭德門泊城內第三街官房子自燕京至上都八百里一步髙一步井深數十丈水極冷六月結氷五月六月汲起氷六月雹如彈丸大一年四季常有雨雪人家不敢開門牛羊凍死人面耳鼻皆凍裂秋冬雪積可至次年四月方消屋宇矮小多以地窟為屋每掘地深丈餘上以木條鋪為面次以茨蓋上仍種麥菜留竅出火有地屋掘地三四尺四圍土牆此地極冷每年六月皇帝過此避暑氷塊厚者數尺夜瞻星象頗大蓋地勢髙故也草三至草七日不許私行不録草八日太后嗣君宫人宫使至昭德門裏官舍安歇福王子𫝊制在隆國處安泊謝樞密在房子下夫人留伴燕京會同館沂王以疾不入城草九日沂王疾亟三十日樞密院以月旦日請太后嗣君福王同宰執屬官宫人中使並出西門外草地望北拜太廟五月初一日早出西門五里外太后嗣君福王隆國夫人中使作一班在前吳堅謝堂家鉉翁劉岊并屬官作一班在後北邊設一紫錦罘罳即家廟也廟前兩拜太后及內人各長跪福王宰執如南禮又一人對罘罳前致語拜兩拜而退初二日太后嗣君福王隆國夫人中使等天曉盡出南十餘里宰執同屬官亦列鋪設金銀玉帛一百餘桌在草地行宫殿下作初見進貢禮儀行宫殿宇宏麗金碧熀耀諸妃諸王但升殿捲簾列坐皇帝皇后共坐霤中諸王列坐兩序太后嗣君福王宰執以次展褁腰金服紫屬官緋緑各依次序立班作朝甚肅皇帝云不要改變服色只依宋朝甚好班退升殿再兩拜就留御宴皇帝問吳丞相云汝老矣如何為丞相領事答云自陳丞相以下遁去朝廷無人任職無人肯做故臣為相未久念臣衰老乞歸田里錢塘遺事卷九
