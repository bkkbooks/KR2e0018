body:
  text: 御製題錢塘遺事失䇿明題去建康却耽山水便都杭見一清首編序語湖邉歌舞酣餘樂天外徽欽棄逺荒八帝厯年纔百五帝昺不足紀年自髙宗至端宗享年一百五十二年舉成數也多奸少正致淪亡翻書千古垂殷鑒漫例飛鴻徒號堂是書為汪啟淑飛鴻堂所藏因假備用目送飛鴻事御製再題錢塘遺事遺事錢塘撰一清興亡政要紀分明考踪似仕又如隱其人始末史傳無考書則紀南宋一代軍國大政賢奸進退畧於髙孝光寜而詳於理度以後有正史所不及者葢似宋時曽任職官故能諳習掌故如此而卷端題識惜髙宗不都建康而都於杭士大夫湖山歌舞視天下事於度外卒至納土賣國云云則又似石隠者流置身局外為庶人之議者考其踪跡葢在仕隠間云致嘆為凡與作荆進據失兼失退據宋氓異更異元氓一清初稱元為北兵北朝似為宋民矣其記元師下江州下安慶則又改稱大元記京城歸附則稱大兵入臨安府一人之書而前後稱謂自相矛盾實為進退無據云湖山歌舞依然在鏡古孰非殷監呈欽定四庫全書錢塘遺事提要臣等謹按錢塘遺事十卷元劉一清撰一清臨安人始末無可考其書雖以錢塘為名而實紀南宋一代之事髙孝光寧四朝所載頗畧理度以後叙録最詳大抵雜採宋人説部而成故頗與鶴林玊露齊東野語古杭雜記諸書互相出入雖時有詳畧同異亦往往録其原文如一卷十里荷花一條二卷辛幼安詞一條韓平原一條大字成犬一條皆採自鶴林玊露既不著其書名其中所載余謂愚聞及余亦作一篇云云皆因羅大經之自稱不加刋削遂使相隔七八十年語如目睹殊𩔖於不去葛龔又書中稱北兵稱北朝憲宗皇帝稱帝㬎曰嗣君稱謝后曰太皇太后似属宋人之詞而復稱元曰大元稱元兵曰大兵曰大元國兵稱元世宗曰皇帝乃全作元人之語盖雜採舊文合為一帙故内外之詞不能畫一亦皆失於改正然於宋末軍國大政以及賢奸進退條分縷析多有正史所不及者盖革代之際目擊僨敗較傳聞者為悉故書中大㫖剌賈似道居多第九卷全録嚴光大所紀徳祐丙子祈請使行程第十卷全載南宋科目條格故事而是書終焉殆以宋之養士如此周詳而諸臣自祈請以外一籌莫効寓剌士大夫歟孔齊至正直記所列元朝典文可為史館之用者一清是書居其一世無刋本傳寫頗稀陶宗儀説郛僅載數條此乃舊抄足本前後無序跋惟卷端題識數行惜髙宗不都建康而都於杭士大夫湖山歌舞視天下事於度外卒至納土賣國不署名氏詳其詞意殆亦宋之遺民也乾隆四十二年二月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀欽定四庫全書史部五錢塘遺事目録雜史𩔖卷一天目山䜟髙宗浙臉金陵山水夢吴越王取故地十里荷花仁和門髙宗定都顯慶寺遊湖詞三賢堂冷泉亭三天竺題白塔橋伍子胥廟射潮箭蘇堤趙堤六和塔詩净慈寺羅漢萬回哥哥龍翔宫浙江十廟孝宗問卜大理寺豕祭格天閣卷二淳熈盛事孝宗恢復辛㓜安詞東窻事發慶元侍讀韓平原趙子直韓平原客濟王三京之役大字成犬辛卯火史彌逺夾攻遼金卷三趙信菴安子文嵩之起復崔福之死孟保相余樵隐余晦帥蜀晦誣惟忠彭大雅趙方威名劉雄飛卷四大兵渡江議遷都隂許嵗幣行大筭法丁相罷政吳潜入相賈相當國李璮歸國嚴覆試一擔擔殺向士璧劉整叛北拘留北使雪詞紫原三䇿卷五推排公田公田專官公田賞罰公田之禍謫皮龍榮銀關先䜟竄謝枋得推排田畝彗星之變理宗升遐理宗政迹度宗即位全后士人言賈相䑓諫應故事似道專政半閒亭排當賈相舉令賈相之虐卷六降生皇子李瓘掛冠龍飛賦題㐮陽受圍髙達赴援賈相出督時相不合戯文誨淫賈相諱言明堂遇雨張貴赴援係籍秀才地生白毛錢神獻夣襄樊失陷勉留賈相度宗晏駕諒隂三元詔兵勤王下郢復州北兵渡江下陽羅堡下鄂州卷七下蘄黄州劉整死下江州下安慶賈相出師遣使請和下饒州破池州蕪湖潰師姜才敗績金山之敗趙與可遁二相遁去諫韓震五木之敗朝臣宵遁罷賈似道貶賈似道相陳宜中卷八張世傑入衛議遷蹕陳宜中奏宜中都督詔諭三將吕文煥回本國書督府檄文王爚平章日蝕陳留並相文天祥入衛徵諸帥不至諸郡望風而降納降表詔罷兵罷團結二王航海宜中夜遁文魁辭相京城歸附潭州死節吉州歸附揚州死節卷九丙子北狩祈請使行程記卷十赴省登科五榮須知省試御試給號丹墀對䇿擇日唱第置状元局
