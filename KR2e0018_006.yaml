body:
  text: 錢塘遺事卷六元劉一清撰降生皇子咸淳戊辰閏正月初六日天明大風雷雨民居逾時皆動日午楊美人降生皇子是為益王十一月重冬全氏降生皇子是為嗣君李瓘掛冠咸淳戊辰龍飛狀元興化陳文龍同郡李瓘太學貫道齊內舍係第三甲正奏名唱名後乞以本身致仕合得恩例盡以回贈父母上書畢辭先取及三魁同舍出錢塘門脫緑袍掛于門上泛舟而去時三魁同舍皆送别瓘有詩云人言學古思入官我謂學易而官難平生透出夢覺關本來面目只儒酸吾親不俟若為觀不如歸去臥林間殿前三䇿罄忠肝多謝皇恩天地寬戲衫卸了白衣還扁舟飛過子陵灘前修亦有逋與搏聖世待之俱寬閒何物种放大厚顔山鬼移文伐其肝此行無復出閩山休音息影谷之盤今朝釃酒釂雲壇便向錢塘門掛冠又有詩云有手須搴龍衮衣有頭須叩九階墀有口須讀離騷詞有腹須飽商山芝有身不願掛緑衣笑問此身欲何之石室山之巔重湖水之湄陶公云樂天知命復奚疑龍飛賦題咸淳戊辰龍飛省試考官商議出題題皆不欲出天子聖人於是别院出乾為天正院出帝德廣運天眷命皆大金年號而天眷又正是徽欽過北之時時人為之語曰正院無天子别院除聖人廣運與天眷却是案此下原本闕襄陽受圍咸淳戊辰北兵圍襄陽攻襄陽劉整之計也整宋驍將號鐡胡孫己未大兵渡江止遷蹕之議者丞相吳潛也盡守臣之力者帥臣向士璧也奏斷橋之功者曹世雄其一而整次之似道功賞不明殺潛殺士璧殺世雄整守瀘州懼禍及已遂叛獻䇿南伐上急攻緩取之書東南之兵勢地勢如指諸掌進攻之計不于淮不于湖廣不于蜀獨于襄者蓋知襄者東南之脊無襄則不可立國吕祉嘗謂得襄陽則可以通蜀漢而綴關輔失襄陽則江表之業可憂者正此也整初至襄陽與少保吕文德借地開互市互市既置因築城置堡江心起萬人臺立撒星橋以遏南兵之援乙丒丙寅間時出師哨掠襄樊城外兵威漸振未幾文德死文煥代守襄陽於戊辰之冬以大兵圍之而襄日孤矣高達赴援襄陽被圍吕文煥遣人告急朝廷遣高達范文虎赴援時北兵於要害處連珠劄寨圍數十里而道不得通襄陽之圍不可解矣賈相出督賈似道請出督而又隂嗾臺臣以留之實無意於出也乃以范文虎為殿帥孫虎臣為步帥時相不合咸淳己巳葉夢鼎辭位不允徑去以江萬里拜左相馬廷鸞拜右相輪日知印萬里與似道議事不合乃去戲文誨淫湖山歌舞沉酣百年賈似道少時挑撻尤甚自入相後猶微服間或飲于妓家至戊辰己巳間王煥戲文盛行於都下始自太學有黃可道者為之一倉官諸妾見之至於羣奔遂以言去繼有張蕃孫者入京調官鄰居一婦人乃宫中乳母因病還家張見其美而不之察日以服玩通殷勤事聞押歸本貫臺章繼上謂蕃孫之為人専以蠱惑人家妾婦為能有趙左司希建者因身沒而亂其家今敢窺伺宫婢無忌憚如此削籍徙嶺南嗣濮王弃妻按章有云糠也不堂蓷焉在谷時人傳以為笑一征官娶罪將李虎妻臺章亦及之自是専務捃托士大夫帷薄之事以供月課理宗厭之嘗加戒勵至於壑黨所為大奸大貪曽不敢言以至亡國悲矣賈相諱言賈似道見襄城被圍日久束手無措日以辭位為請至咸淳庚午襄陽之圍不解者三年矣一日度宗問似道襄陽之圍三年矣似道對曰北兵已退去陛下得臣下何人之言度宗曰適有女嬪言之似道詢問其人誣以他事賜死自是邊事並無敢言者明堂遇雨咸淳壬申九月祀明堂平章賈似道為大禮使駕幸景靈宫回宿太廟質明有司奏中嚴外辦請升玉轂大雨如注胡貴嬪之兄帶御器械胡顯祖檢討開禧登輅遇雨乘逍遙子故事面奏上白賈賈欲候雨止登輅顯祖回奏平章已肯上遂冒雨乘逍遙子直入和寧門百官愕然莫知所以禮成肆赦似道奏臣充大禮使而陛下舉動不得預聞乞罷政即出嘉㑹門三降御筆勉留乃還朝鐫罷胡顯祖出胡貴嬪為尼上為之泣下張貴赴援壬申五月張順張貴赴援襄陽襄樊自丁卯以來被圍日久生兵日增既築鹿門之役水陸之防日密築白河虎頭及思關以鍵出入之道自是孤城閉守者凡四五嵗援兵往往扼關不克進所幸城中有宿儲可守然所乏者鹽薪布帛耳張漢英守樊城募善泅者置蠟書於髻中藏積草下浮水而出謂鹿門既築勢須自荆郢救援既至隘口守者見積草多鈎致欲為焚爨用遂為所得於是郢鄧之道復絶矣既而荆閫移屯郢州而諸帥重兵皆駐新郢及均州河口以扼要津又重賞募屯士得三千人皆襄郢山西民兵之驍悍善戰者求將久之得民兵部轄張順張貴張貴號為矮張所謂大張都統小張都統者其智勇為諸軍所服先於均州上流名中水立便寨近水哨輕舟百艘每艘三十人鹽袋布二百且令之曰此乃有死而已壬申五月漢水方生於二十二日稍進圜山下越二日又進高須港口結方陳各船置火鎗火炮熾炭巨斧夜漏下三刻起船出江以紅燈為號貴先登順為殿乘風破浪輕犯重圍至磨洪灘以上敵舟布滿江面無罅可入鼓勇乘鋭風斷鐵綆攢筏數百屯兵雖衆皆披靡以避其鋒轉戰一百二十餘里二十五日黎明抵襄城城中絶援久救至大喜及收軍㸃視猶失張順軍中為之短氣數日有浮尸而上被甲胄執弓矢直抵浮梁乃張順也係籍秀才御史陳伯大奏行士籍先是朝廷患科場弊幸百出有收解過省而筆跡不同者有冒已死人解帖免舉者多方措置乃議今後凡應舉及免舉人各於所屬州縣給厯一道親書厯首將來赴舉過省參對筆跡異同以防僞濫時人謂之繫籍秀才咸淳庚午科已行之矣時人有詩曰戎馬掀天動地來襄陽城下哭聲哀平章束手全無䇿却把科場惱秀才太學生蕭某有詞云士籍令行伯仲分明逐一排連問子孫何習父兄何業明經詞賦右具如前最是中間娶妻某氏試問於妻何與焉鄉保舉那當著押開口論錢祖宗立法於先又何必更張萬萬千算行關改會限田放糴生民凋瘴膏血俱脧只有士心僅存一脈今又艱難最可憐誰作俑陳堅伯大附勢専權地生白毛咸淳癸酉平地産白毛臨安尤多如銀線可採以相餽但挺直或者謂此亦白眚白祥之類是也錢神獻夢咸淳癸酉春賈相連奏乞出視師且謂諸閫欲為敗闕張本每遣客游談不曰無財力則曰無兵力不知臣之料錢招軍悉有實狀可以按覆奏罷歸府合目靜坐忽夢有男子團面方口突然而入賈相叱之曰爾何人敢至此答曰我金主也相公早間入奏太激天下事不由相公皆由我相公好好做三年我六年後亦不復顧人間事言訖賈相且怒且醒因與所親言之漫不可曉三年而賈相罷六年而錢禁行乃知男子錢神也廢興信有數云乎哉襄樊失陷咸淳癸酉春二月破樊城下襄陽文煥捍禦應酬偹殫其力糧食雖可支吾而衣裝薪芻斷絶不至文煥撤屋為薪緝關為衣每一巡城南望慟哭城破遂以城降且獨守孤城降於六年之後豈得已哉勉留賈相咸淳癸酉自襄樊敗後似道纍章乞出視師謂非臣上下驅馳聨絡為勢作急奔赴則大可慮者而又隂嗾朝臣論奏以為師相不可一日離左右度宗晏駕咸淳甲戌秋七月度宗崩皇子㬎即位太皇太后垂簾聽政改明年為德祐元年諒隂三元度宗崩幼君諒隂榜第一名王龍澤案說郛作王龍潭二名路萬里三名胡幼黃京師為之語曰龍在澤飛不得萬里路行不得幼而黃醫不得詔兵勤王冬詔天下勤王贛州太守文天祥應詔募兵朝廷分兵九路會合端明黃萬石江西侍郎趙縉金陵江隂開封夏貴淮西節使督萬夀京湖殿闕張彥廣德招討孫虎臣采石都統仇子真宣城練使張世傑海道費伯恭阮克己平江克己揚州人糾集義兵三萬勤王下郢復州咸淳甲戌冬十月下郢州沙洋守將邊居誼死之時丞相伯顔將兵號百萬用南降人為向導吕文煥等舟師出襄陽劉整等騎兵出淮泗分道並進攻郢郢人堅守以戰船橫截江面不得渡文煥覘視傍有一湖可通大江於是大集人力陸地牽舟迂行凡百餘里然後至水舟師忽自上而下沙洋之備未能措守守將邊居誼所部三千人盡力死戰竟無一人歸附十一月下復州北兵渡江甲戌十二月初九日北兵自襄陽罷洑沙口出江十四日渡江常時江水風波不可狎視至渡江時江水竟平豈非天哉圍漢陽軍移師攻陽羅堡淮西制置夏貴拒戰於陽羅堡敗績奔還廬州夏貴自陽羅堡之敗順流而下沿江南岸縱兵放火歸廬州解甲當是時其心已無國矣後有人題詩廬州夏貴節樓有曰一語淮西留養老三更江上便收兵縱使節樓高萬丈到頭難免重臣名下陽羅堡陽羅堡乃江鄂屏蔽一帶有七百坳風起則多利北舟欲守此江必守此堡此堡既失則鄂危矣守將閬池王都統與所部八千人死戰中流矢而死乃自陽羅堡攻鄂州下鄂州咸淳甲戌十二月十八日下鄂州守臣張晏然降先是李雷奮為守十月以臺論罷至是無正官張晏然守鄂所恃者朱祀孫之援朱祀孫提重兵至鄂退歸江陵晏然失助鄂遂降矣夏貴與朱祀孫通任長江之責朱歸荆州夏歸淮西一上一下中流蕩然全無備禦哀哉錢塘遺事卷六
