body:
  text: 錢塘遺事卷三元劉一清撰趙信菴信菴趙葵南仲忠肅公幼子意氣豪邁倅濠梁日有婢與客私公知之伺婢夜出䄂劍出帳中一揮斷二人頭棄之城溝辛卯李全送死維揚奏功自三京之役家居數年至淳祐癸卯優詔起復畀以重任爲叅預時有奏對日記穆陵與之密議儲事公再三賛决且云如陛下即位便不是好樣子尤人所難言也除拜右相葵屢上辭免而朝㫖促赴闕益急後葵到京以宰相須用讀書人劾之葵巳知之矣乃徑出國門疾馳而歸題南鄉子壁間云束髮領西藩百萬雄兵掌握間召到廟堂無一事遭彈昨日公卿今日閒拂曉出長安莫待西風割靣寒羞見錢塘江上柳何顔瘦僕牽驢過逺山後有表奏曰霍光不學無術毎思張詠之語以懐慚后稷所讀何書敢以趙抃之言而自觧是雖有激而云然亦見機而作矣歸領鄉郡推心愛民一鞭不妄施暇日過嶽麓精舍舍長劉某年差長將坐揖曰相公主席公搖手曰到這裏説甚相公竟就賔席取酒盡歡而去後居溧陽已未難作聞命即出丙寅時事粗定告老還鄉舟未發以書報郷人及兩學士㕛無不歡悦長沙兒童日呼舞於市曰相公歸云冬十月二十六日至齊安中夕電光如燭空中焠然有聲遂薨安子文安子文與楊巨源李好義合謀誅逆䂀旋殺巨源而專其功久之朝廷疑其䟦扈俾帥長沙子文盡室出蜀嘗自賛云面目鄒捜行歩䖃苴人言托住半周天我道一塲真戲要今日到湖南又成一話靶在長沙計利析秋毫㕔設前豢豕成羣糞穢狼藉肥腯則烹而賣之罷鎮梱載歸蜀厥後楊九鼎在蜀以刻剥致諸軍之怨軍士莫簡猖亂殺九鼎剖其腹實以金銀曰使其貪腹飽飫時子文家居散財給士生擒莫簡剖心以祭九鼎迄再平蜀難嵩之起復淳祐乙巳正月劉漢弼正夫由閑卿監擢拜臺臣先是九月嵩之自右揆丁父憂優詔起復蓋援彌逺例也嵩之朶頥不起特以葬爲辭逡巡未就闕十一月徐元杰侍郎因對以起復爲非嵩憾之語所厚曰吾與徐誼不薄何不密以啓我自是繼有論奏上意不復向嵩臺官彈擊無虛日未幾漢弼以腫疾死杜丞相範繼薨徐又以伏暑暴卒物論沸騰直謂數公皆中毒死徐則徧體青黑朝野爲之驚駭堂食無敢下箸者於是揭榜通衢重立賞格移文棘寺嚴鞫姦兇然竟莫明所以已而出太府之幣畀上腴之田賜之史嵩之當國一時正人如杜範游佀劉應起李韶趙汝騰等皆以不合逐去時喬行簡平章李宗勉左相史嵩之右相三相當國時論謂喬失之汎李失之狹史失之專然宗勉清謹守法號爲賢相崔福之死崔福從趙葵收李全名重江淮爲人勇悍喜於生事而無忌憚陳韡爲建康留守崔爲路鈐奪統制官王明鞍馬又廹逐緫所趙監酒親屬公委㑹㕔四字未詳疑有誤戒諭然不悛值王歩帥統師過淮乞崔福軍前恊力因厚遣之崔福遇賊不擊託言葬女而歸更不申大閫取㫖主帥亦無如之何陳以爲從本司調遣而蔑視軍法如此若不明正典刑則更相傚法押赴教塲處斬人以爲文臣不習邊事多爲武人所輕韡爲積忿而發也殊不思良將難得爲帥閫者推誠共事果䟦扈淩犯自當申取朝㫖豈可擅殺孟保相孟珙號無庵兄弟中第四故稱四孟機畧沈鷙世罕能及嘗攻大金公統兵四萬至蔡州滅之由是威名浸盛爲荆湖制帥善御衆得士卒心輕財結客對境虛實莫不周知外國機要間探尤密性好佛夜則趺坐召偏禆以下五七十人施氊褥俱席地自上而下各舉一話或目前事或市井笑謔事無不可言者言有可笑輙相與大噱惟不得訐人隂私於是上下之情無不通者軍中私密外間詭詐皆入其耳久任邊帥朝廷頼之後無疾而逝兄璟稱三孟嘗知鄂州性寛厚弟十孟知岳陽皆然子之縉立朝尤有大節理宗朝邊稱帥者必曰諸孟云余樵隐余玠字又夫淳祐三年帥蜀慷慨自許創建城壁修築關隘増屯堡柵數年之間邊塵不驚浸以驕恣初玠之臨遣也有挈故地還天子之語十年天子降詔褒諭玠八年守蜀之功鄭青山再相因從㬰其進兵且以私書與玠云老夫只候此著爲退身計於是一意出師至興元無功而還壬子冬北兵知其所爲入掠成都薄嘉定無禦之者玠帥蜀罔功每交結權要及中外用事者奏牘詞氣悖慢示敢專制之状上意不平之徐清􅅱奏云余玠不知事君之禮帥蜀無功陛下胡不出其不意召之上不答一日御筆余玠以本職奏事庚牌到蜀而玠以漢中敗績歸羞愧飲藥而死余晦帥蜀寶祐甲寅余晦帥蜀徐清􅅱奏云朝廷命令不行於西蜀者十有二年矣今者天斃玠此乃祖宗在天之靈社稷無疆之福陛下大有爲之機也今乃以素無行檢輕儇浮薄不敢任重如晦者當之臣恐五十四州軍民不特坐而輕鄙之敵國聞之亦且竊笑中土之無人矣所有余晦内批乞賜收回御筆責清􅅱曰數十年來未見執政繳回成命者卿若固執則廟堂之間同列之人皆有不安召命已頒决難反汗其後余晦果敗蜀失紫金山要地爲其城之也晦誣惟忠余晦繼玠爲蜀帥一日有南永忠者叛反書聞王惟忠適留閫問南永忠何如人惟忠盛言其勇而義晦曰人言其不可保有之乎惟忠云當入状以百口保之晦即取紙俾書既畢探懐以反書示之愕然晦謫歸以王惟忠庇叛事告于朝遂入大理獄全臺入晦之殿院陳大方尤主之惟忠竟斬東市此事本非其罪晦懼禍及已故誣之耳未幾大方奉祠歸紹興得疾目擊惟忠之爲鬼露頭籲天謂非所爲聞者嗤之惟忠與晦俱浙東人少微賤晦小名余開五以余天錫之薦爲四川制置使時惟忠爲利路安撫閱除目笑曰余開五來也晦聞之故誣奏惟忠斬於市血迸流而上惟忠色不變曰吾将訴於天以明此寃也彭大雅彭大雅字文子癸卯守重慶時蜀已殘破大雅披荆棘冒矢石築城以守爲蜀根柢自此支吾二十年大雅之功也然取辦峻廹徳之者固多怨之者亦不少後謫死蜀士大夫爲之立廟焉大雅入蜀曾有祭諸葛武侯文云大國之臣不拜小國之卿大雅今拜矣拜公以八陣之神圖拜君以出師之一表尚饗其文甚偉趙方威名趙方嘉定年間爲淮閫威望表聳金人相戒不敢犯邊皆以趙爺爺呼之貎古怪兩眼髙低一眼觀天一眼觀地人皆望而畏之不敢仰視一日浴湯伏事底窺見一巨蛇蟠于桶中皆不敢漏泄一夕之鼓不鳴詰朝申舉當更軍人自分必死及執覆謂有巨蛇蟠於鼓故不敢近以故皆謂蛇之精鎮邊數年一塵不驚兩子六直閣七直閣隨侍立淮北人有六隻角七隻角之呼其威名已逺暢矣後欲上武當山燒香上真降筆曰襄陽趙方欲上武當酆都小卒不請燒香方初登第作尉時嘗訪辛稼軒留三日劇談方畧辛喜之謂其夫人曰近得一佳士惜無可爲贈夫人曰我有絹十端尚在稼軒遂将添作贐儀且奉以數書云諸監司覔文字趙極感之後辛死其子遇趙作荆湖制置適在幕下僉屬謂趙以乃父曩疇之故賜以提挈不料待之反嚴無時程督幾不能堪至與其母對泣幸三年官滿辭趙告歸趙曰且可留一日即開宴請其母夫人同來樽前與其母子曰某三年非待令嗣之薄吾受先公厚恩正恐其恃此不留心職業故爾今已爲經營到諸監司舉紙七状皆足並發放在省部訖自即當奉少費請直去改官辛母子方感謝無涯大賢之陶鑄後進報稱舊恩如此夫劉雄飛淳熈年間鄂州江夏縣尉司都頭楊文其妻八娘常行善念一日隆興解到賊徒二十五人來鄂州發下尉司楊文收管拘鎻有劉雄飛者貎魁偉八娘以爲異待之極厚楊文出巡按盗八娘遂打開索鎻俾雄飛遂遁仍與顧舟盤費雄飛一夜過江宿於荒沙壩中夜半見天門大開車馬往來心内自喜至鎮江府適揚州制司招帳前敢勇軍遂投充軍隊至揚州制司調遣出軍大㨗而回除帳前統制官後累有功遷權帳前副都統適和州缺守賈似道爲制置使差雄飛權和州到郡數月正除知和州雄飛遣人迎楊都頭夫人偕來則八娘已死矣厚贐楊都頭歸俾作功徳追薦八娘後雄飛爲四川制置仍保楊都頭爲帳前統制後知重慶府劉之報恩可謂至矣錢塘遺事卷三
