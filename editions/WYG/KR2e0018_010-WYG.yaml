body:
  text: 錢塘遺事卷十元劉一清撰赴省登科五榮須知兩覲天顔一榮也臚傳天陛二榮也御宴賜花都人嘆美三榮也布衣而入緑袍而出四榮也親老有喜足慰倚門之望五榮也省試正月二十五日午間鎖院至晩宣押省試官入院試前一日省試院引保或不用親臨只貢之書鋪書鋪納卷鋪例五千自裝界卷子與之或只二千無定價過此無害也宗子又有一宗文字頗多非四千不可特奏名納卷亦三千二月初一初二初三日引試詩賦人初五初六初七日引試經義人初九初十十一日引試宗室鎖㕔應舉人混經賦為一塲十三十四日引試取應宗子别試所則又遲經義塲一日乃初六初七初八日也省試案子不得以方州移動挾書傳義皆所不可卷中自有第幾幕印子收納士人自書冶經鄉貫姓名押字於歴上若昏黒歴子收去無歴可書大有利害御試給號試前數日書鋪告報士人請號納卷鋪例五千因鋪家卷子兼得御試須知一本禮部給正奉名進士號次日給特奏名及四川進士三色宗子號書鋪知委體例二百錢與之索添不過三百請號之日士人天未明到書鋪黎明而祻幙入都四字疑有誤書鋪引入尚書宰執據案坐于庭中設桌子及歴外吏部依省榜次第喚姓名而前逐人自書姓名押字于歴記則得號一枚吏使與之號則唱而戒之曰牢收號入殿不得搪突號以白紙半片為之有字數行尚書侍郎郎中偕銜押字及有中官某人監集英殿門試日以其號照入殿門一失其號則不得入矣丹墀對策廷試之日士人由和寧門入徐行執號樂衛士收數成行而入至集英殿門外中官展視而收之殿外掛混圖于露天甚髙良久天大明了然分明知位次士人聚于殿門外待百官常朝畢方引士人進拜列于殿下宰臣進題上覽焉天子臨軒天顔可瞻起居賛曰省元某人以下躬拜再拜又躬身而退各依坐圖行列而坐每位有牌一枚長三尺羃以白紙已書某人某鄉貫或東西廊第幾人不得移動及汚損坐定中官行散御題士人皆以御題録于卷頭草紙上以黄紗袋子垂繫于項上若有損汚謂之不恭納卷所不受散題後駕已興入内進膳賜食于士子太學饅頭一枚羊肉泡飯一盞食畢不見賜謝恩或要登東作旋則抱牌捲卷子而往衛士相引而去亦不甚逺既坐而試不得與鄰座說話中官從官雜處董之宰執巡行至申時天子復臨軒納卷於殿廷東廡階下之寨中一中官監視收其牌及御題卷子亦不容人臨時於納處展視若至昏時則見闕傳者云已不在黄甲矣士人每出一門必書姓名于門東歴四門皆書姓名押字出時無號無人押行亦不待人齊出擇日唱第皇帝御集英殿唱名非有他殿只掛集英殿牌於殿前特奏唱名則於數日之後先唱名數日書鋪又告報請號禮部又散號一如廷試給號之禮及得號視之乃前日所收之舊號也但於其上用紅印書入集英殿試訖中官姓名押小字一行耳仍戒曰牢收號入殿不得搪突書鋪告報之人又有所求先量支少與之不得開口唱名之日亦由和寧門而入身襴袍而足亦穿靴列行舉號數人收號一如廷試之日候南朝畢賛者引入廷下再拜皇帝臨軒宰臣進三名卷子讀于御案前用牙箆㸃讀畢宰執立于上前閤門立于御案之西向宰執先於御案前拆視姓名則曰某人閣門則承之以傳于階下衛士凡六七人皆齊其聲傳其名呼之謂之臚傳亦謂遶殿雷也凡呼而唱者三四聲士人方從衆中出應衛士夾而翼之問以鄉貫父名翼至廷下對玉墀且躬未拜廷上問以鄉貫父名衛士則以對對畢過軒下少去就甲人次其榮在此也非特名登天府三代祖父之名逹於聖聽矣待一甲畢則往兩廊角取𠡠黄而執之甲内人齊則廷上呼謝恩士人廷下立躬身再拜而退去于軒下狀元則便獨班謝恩不待甲内齊也自第二名第三名為一班便賜食相身為袍各設位賦詩以答皇恩第四名至第十名終為一班第二甲全甲為一班謝恩了皆且執勅黄而立勅黄用麻紙兩幅連粘大書某人等宜唱某等科第狀元至第二甲終皆曰宜賜進士及第第三甲第四甲終皆曰宜賜進士出身第五甲則曰宜賜同進士出身𠡠黄可漏子又長於𠡠黄一尺唱第二甲盡駕興入内進膳須臾賜進士食三品赤焦肉餅二枚天花餅二枚只是素餅羊肉飯一盂并羊􅅅飯肉有盪粉皆三品併至上方起衛士已將下三甲名字來排當士人兩衛士管一紙一紙書十五人名字皆先自喚集排當資次仍問鄉貫父名審畢候上復出殿上一呼某人則衞士已夾其人而進于前駢貫而進亦候一甲齊方拜謝恩授黄𠡠有恩例陞甲人則當殿上宣示上㫖某人有某恩合陞一甲末所以方走唱名之人雖有恩例亦不可自陞甲盖陞甲人面授出㫖當殿謝恩故也若無陞甲恩之人不入赴唱名傳者曰待二年外方許到却唱至第五甲上亦入少憩頃之待出唱第五甲畢士人皆執𠡠黄再拜殿上傳曰賜進士袍笏袍笏積于殿外之兩廡下士人出殿門於上廊爭取之往往皆不暇脱白襴而便就加緑袍於其上其所賜淡黄絹衫一領袖如綠袍之寛大淡黄帶子一條緑羅公服一領笏一面士人披衫繫帶未畢則殿上催謝恩謝恩罷拜而出紫緑相間環堵可觀紫袍牙笏以取左宗子拜所賜也擁而趍出門頭亦不待書名字盖前日秀才今日官人五榮之中此屬其最唱名時不可一聞姓名遽然而出尤加詳緩之為佳唱第既出至大門外人備車馬以須其出者十有五六若自有車馬雖不用支散然群不逞隨之呵殿元者數十為隊所費亦不貲不若只行出内門前茶店中待其人疎洒行歸耳状元榜眼探花須皆與上馬盖臨安府自備馬以待之也置状元局状元一出都人爭㸔如麻第二第三名亦呼状元是日迎出便入局局以别試所為之謂之三状元局中謂之期集所大魁入局便差局中職事一一由状元㸃差牒請糾彈牋表小録掌儀客司計掌器掌酒果監門多者至五六十員少者亦不下四十員視事官送牒例皆二十初第人多喜入局得陪侍三状元與諸同年款宻它日仕途相遇便為傾盖常例五日一會食否則日中有酒杯㸃心果子二色局中職事官雖多入局而食者常半之食罷出入無妨三状元常宿於局中不可出宿於外月餘而罷局凡預局中職事官員納小録題名錢非職事官須納錢五千而後得小録題名一本状元入局之初依全賜錢一千七百貫及諸公納到助小録錢亦一千三百貫有奇三状元入局五日職事官入局局中以職事官名申臺部十日後正謝正謝日係太史臺擇日亦謂之門謝禮用牋表皇帝及東宫牋表隔日計會閣門通進表中止用三状元名銜正特奏同日而謝是日亦由和寧門而入在常朝殿門外北面天顔賛者引唱躬拜再拜而退門外有立仗馬及衛士等衛士唱喏畢馬退士人方列班而拜拜君之門而已越二日拜黄甲於貢院黄甲者由省中降下唱名既畢省中以其所升甲之人附于甲末用黄紙以書之故謂之黄甲是日貢院設香案於廷下状元引五甲内士人拜香案禮部亦遣官來賛導置黄甲於案中望闕拜畢士人列兩廊四十以上東廊四十以下西廊其日擇一人最年髙者上堂大魁拜之年髙者答拜又擇一人最少者上堂拜大魁大魁亦答拜而退人吏以紙筆請各書姓名依黄甲排與臣者鎸于題名石是日謂之叙同年拜黄甲也特奏不得預焉越四五日鄉人之官于朝者為鄉會以待鄉中之新第者越三日赴國子監謁謝先聖先師祭前三日状元㸃差職事官十四員監禮官彈壓職事之不恭者奉禮官跪于先聖先師座前奉幣進之于獻官太官酌酒以進之于上三獻官太祝讀祝分獻官十員分獻于十哲及兩廊賢臣一人分獻十五位每位皆之拜搢笏興伏拜起皆賛者導之禮畢而班退賛者皆太常寺差來越三日局中職事官下湖運司做二大舟局中連三状元凡七八十人分坐于兩舟酒數行借張侯之真珠園散步侯家亦有餽焉其例也薄暮艤舟于玉壺園而竟席書鋪告示越十日引正奏各黄甲士人射上自按試于講武殿次日賜聞喜宴于貢院齊而後押宴官率官屬及進士列拜于庭下面闕設香案侍從及貼職官皆預焉凡拜五舞蹈其節有四共十拜也拜訖正奏各坐于東廊特奏各坐于西廊立亦如之小黒桌子坐則青墪果子人各四器望果一器望花一朶醯醢列于前初坐先斟酒三行不下食第三酌下旋鮓一碟第四第五皆有食以配酒五行而中歇人賜宫花四朶簮于幞頭上花以羅帛為之從人下吏皆得賜花又有例賜氷再坐分與士人又到班庭下再拜謝花簮而謝之兼坐帶花又四盃而竟席前筵羊半體七寳頭􅅅並皆奇品初坐則以銀臺盞酌再坐則易以銀巵共九行而飯則粟米為之畢宴不用謝恩退皆簮花乘馬而歸都人皆避其赴御宴回也次日局中自用錢作期集所會遵前例也亦七盃正奏各皆預焉亦就貢院為之越十日集注是日天拂曉袍笏書鋪引入部前數日部中先榜于門亭書鋪録示新第人先擇其願授者而書于笏及入部郎中坐庭中以殿榜資次而呼前廷上唱曰某人官人上階揖問曰願受甚處闕對郎中視簿合受則揖廡下書簿中某人願授某州某官闕而退三状元皆送闕不與集注告𠡠一道印紙一軸信符一道門謝闗子一道常例皆賜御冩經書一軸或賜御製詩一首臨安府鐫碑裱裝賜宴時以分賜士人錢塘遺事巻十
