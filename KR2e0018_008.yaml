body:
  text: 錢塘遺事卷八元劉一清撰張世傑入衛乙亥三月初十日張世傑入衛京師內空賴張世傑一軍萬人自荆湖至世傑本信安歸正人擢承宣使陳宜中疑世傑易其所部之軍世傑不得以盡其力吕文福請提兵入衛文福文煥兄也議遷蹕宗學上書曰臣等為國同姓與宗社相依為命近者元臣開督視師繼而又聞逆整列斃臣等私竊喜之邇日以來京師內外喧傳皆謂內人今已放歸御船今已排定營衛諸軍皆已點差倉庫今已搬移陛下移蹕亦在旦夕躊躇未即行者獨吾太皇太后不肯輕動爾臣竊為陛下謀者不過移蹕慶元其次則移蹕平江至事勢危急則航船幸閩不思我能往彼亦能往縱使兵或可守陛下豈能鬱鬱求活作一龜兹國耶北兵渡江已踰兩月不聞有備禦之䇿但聞和議之請和議未必能成危亡之勢漸迫今天下勤王之兵在京屯戍者不下二十萬猶堪一戰豈束手待斃而已哉臣願陛下戒諸將帥糾集精兵盡力血戰戰若不勝死於社稷猶可見藝祖於地下惟陛下思之幸甚陳宜中奏殿院陳宜中奏云近北兵渡江已踰兩月上而三宫下而萬姓皆謂平章賈似道督師一出未必負三朝禮遇之恩必能以一死酬天地涵容之澤而乃擁師逗留不發一矢今月二十日忽報孫虎臣此下疑有闕文又二十二日報臣等以諸軍皆潰散初猶有自與一決之語既乃發為海上迫駕之言臣見其平日自詭以知兵意或有深謀祕計可以救一脈於垂亡觀其所措有非腐儒所能測識忽二月二十八日早有督府隨行吏回歸乃言似道於二十日夜三更鳴鑼一聲喝散諸軍竄身而去莫知所之臣聞之血淚迸流欲死無由因自痛念曩經丁大全敗竄之餘適際理宗再生之德徼逾末年似道時適當國起自書生叨居向地彼雖一出臣每見其施行時有差舛未嘗不從容納規而才弱力凡莫能救正如范文虎事爭之不力稔禍今日涕殞何追今似道以潰師竄身上誤宗社臣曩為臺諫既無吕誨之先見臣今為執政又不能為社稷之力爭罪何所逃謹具自劾以聞欲望聖慈重行追竄正平日茍容之罪以謝公論仍乞正似道誤國之罪以謝天下祖宗德澤未衰人心戴宋猶故元氣一脈尚可挽回仍乞將公田市舶茶鹽等咈民所欲者悉賜改正令學士院降詔以明太皇太后陛下哀痛悔恨之意少回皇天舍逆助順之心陳宜中都督陳宜中都督軍馬時乙亥四月也奉旨建督于京檄召諸路軍馬勤王并令潰軍各歸所部淮東𨽻李庭芝淮西𨽻夏貴松江隸汪立信四川𨽻朱祀孫河西𨽻黃萬石節制團結內外兵十七萬五千人分廂差寄居官為總督給以兵赴教場教閲詔諭三將五月太皇太后詔諭吕文煥等息兵通好詔曰賈似道專制朝政十有五年挾智私行矜已自用結怨軍民失信鄰國戰功當賞而不賞邊費當支而不支盡心力以守襄城者坐視不救備已財以贈郢兵者反受責言遂使諸將離心三軍解體比者請師出督畏死偷生不戰而逃莫知所在自古失律之師未有如此之繆者吾已節次明正其罪但念吾年七十抱病滋久嗣君幼沖煢煢在疚念北方之兵薄吾近地宗社危急不可以一朝居似道召禍如此老身幼主實受其殃因思爾文煥世受國恩久當事任守城六載殊殫勤勞爾奕爾文虎皆受先朝之知嘗任岩師之寄一時捨此度非本心三人在北豈能遽忘本朝之舊不念吾國之危兹用手披敷陳吾意爾三人為吾轉道此意於帥相吾老幼雖不足念生靈何辜受此荼毒不知何道可以息民何辭可以通好于北朝以成南北之美意以紓社稷之近憂願亟為我圖俾王室不壞理宗度宗在天之靈亦必降于爾衷故兹詔示想宜孚悉吕文煥回本國書報國盡忠自許初心之無愧居城守難豈圗末路之多差兹祈轉念昔日之功庶可少伸今日之款明公問信歸人欲言伏念某少服戎行壯臨邊徼干戈滿眼輕性命於鴻毛弓箭在腰繫死生於馬足不但驅馳於西北誓將屏蔽於東南幸以微勞屢收薄效至若襄城之計最為淮甸之危蠢兹無厭之鄰指將必攻之地迅裂如水火之衝擊飄蕩如風雨之去來坐一日為尤難居九年而可奈南向髙築蓋欲拒吾喉襟樊城盡屠其在剪我羽翼雖劉也首先於犯順而焦然中告於黨姦孤城其如彈丸謂靴尖之踢倒長江雖曰塹固欲投鞭而斷流凶焰如斯先聲屢至臣能死爾仰天而哭伏地而哀男既生氓析骸而爨易子而食尚冀廟堂之念我意令鄰郡之聚兵委病痛於九年之間案几肉於羣虎之口因念張巡之死守不如李陵之詐降猶期後圖可作內應國手局敗留著此豈奕尋常之機俗眼圖耳觀形奈不識驪黃之馬蓋使忠臣偶陷於敵國從亦絶意不念於鄉閭固知死也何補於生安有食焉不任其事因銜北命乃擁南兵視以犬馬報以仇讎非曰子弟攻其父母不得已也尚何言哉今皇上亶其好生開以自新之路明公都督雖是問罪藹然念舊之情安敢固違永為背叛見今按兵不動臥轍不驚撫此良臣伏覩景命且秦穆公之救殺馬在野人猶知報恩如齊桓公之相射鈎願君子終無忘怨督府檄文略曰且整之叛我也固以自疑若煥之去國也獨何不忍不思桓溫羣從並受卵翼之恩李陵一門初無毫髮之損國家危運一至於此人心忠義夫誰無之太皇后七帙之聖躬今天子孤惸之沖質在人情猶知恤鄉閭之老幼矧人子忍坐視君父之傾危寧無郡國表臣亦有江湖豪傑共僉倡義之旅載馳勤王之師如陶士行慷慨之真如張魏公忠赤之至救日之弓救月之矢便直指於旌旗如礪之山如帶之河尚永堅於盟誓王爚平章乙亥四月王爚平章軍國重事八月王爚致仕爚具位平章在朝無所建明不顧君父之顛危退為保身存家之計鄙哉日蝕乙亥六月初一日午時日有食之既是時天地晦冥咫尺不辨人雞鶩歸猶如暮夜自已至午其明始復詔曰天降罰于我家嗣君幼沖未堪多難吾以衰耄勉強聽政明不能察姦臣之誤國仁不能救兵革之殄民德澤弗流政令多失乖氣致異謫見于天乃夏季月朔日有食之既陽微晝晦變莫大焉吾惟艱危之會憂心如熏重以災異譴告于何不臧憂咎在吾痛自先責貶損尊號尤恐未盡應天之實方與嗣君夙夜祗懼省躬悔過慨念姦臣專政之久杜塞賢路蒙蔽天變下情壅於上聞禍至此極今吾自警悟少懲艾虛心聽政惟人言是聽以答天意咨爾百僚士庶盡忠極言凡涼菲之愆政事之疵黎元之疾苦爰暨修禳固圉之常䇿可以捐厄運𨗳和氣者毋有隱之將採擇施行人心恱而天怒解庶幾在此布告中外體吾至意太皇太后內批痛自切責以答天戒可去聖福二字用昭吾恐懼修省之意陳留並相乙亥六月陳宜中左丞相留夢炎右丞相陳文龍黃鏞僉書樞密院事謝堂鎮撫使家鉉翁知臨安府文天祥刑部尚書趣赴行在夏貴淮東制置知揚州朱煥淮西制置知廬州召李庭芝赴行在夏貴不受代李庭芝閉城自守文天祥入衛乙亥四月文天祥為江西提刑募兵於贛州吉州杜滸糾合四千人從之至九月天祥將吉贛民人及洞丁二萬人入衛衣裝器械戈甲精明人心喜慰詔褒奬除江浙制置使知平江府提兵捍禦時陳宜中歸永嘉留夢炎當國夢炎意不相樂乃以天祥為制閫出守吳門徵諸帥不至徵吕文福入衛行人失辭文福自疑不至徵夏貴督萬壽黃萬石入衛並不至京城招軍年十五以上號武定軍長不滿四尺觀者寒心諸郡望風而降乙亥三月知江隂軍鄭濡道遁知廣德軍令狐降三月十四日下平江府守臣潛説友遁通判胡玉以城降下安吉州守臣趙與立降江上列城或降或遁無一人堅守者四月下江陵府髙達京湖名將已未解圍鄂州似道許以建節後竟不與達怨望久矣至是為京湖制置以城降宣閫不能制城初陷朱祀孫仰藥不得死既而亦降焉乃令朱祀孫移文諸州歸附鼎州澧州常德府壽昌軍並降大兵徇湖南圍潭州安撫李芾與大兵戰于澧陵得捷守城攻之不克九月大兵至獨松關殺亷萬户希賢後丙子二月亷希賢之子殺張濡磔之濡俊之曽孫也十一月十六日大兵下隆興府劉槃以兵纍戰不利遂以城降牛傅危天順二將赴火死瑞州先下姚計議至隆興説降劉槃拒之乃引兵出戰殺戮不小凡纍戰不利不得已而以城降大兵至撫州時制置黃萬石開閫撫州聞大兵至而遁都統密侑迎敵就擒不屈嚼舌罵聲不絶而死施至道以城降建昌相繼而下朱帥戰于相關敗績去杭百里獨松關告急召文天祥入衛天祥自吳門還遣守獨松關時天祥軍三萬張世傑軍五萬諸路勤王師猶有四十餘萬天祥與世傑密議今兩淮堅壁閩廣全城王師且衆何不與之血戰萬一得捷則罄兩淮之兵以截其後國事猶可為也世傑大喜遂議出征獨冝中沮之事不成矣二十八日攻平江府通判王矩之以城降十二月大兵屯平江府伯顔在焉京師戒嚴留夢炎陳文龍黃鏞劉黻並遁大兵屯於長堰陳宜中蒙蔽外庭隂遣使請和見伯顔於長安堰已而不如約故大兵竟至皋亭山丙子正月大兵入臨江軍權守滕岩瞻遁臨江告急吉州乞兵援守吉州差禁軍三百人至臨江防拓舟必從吉水敢勇軍守吉水陸必從永豐忠勇軍守永豐未幾大兵至禁軍潰散大兵入臨江大兵更自桐江疾馳至吉州城下十八日大兵進皋亭山去城三十里北使請執政軍前議事文天祥請行百姓官民迎丞相伯顔于皋亭山十九日大兵進屯北關門外東城百姓門各各帖好投拜三字吕文煥范文虎九騎入城遂入大內謁太皇太后納降表乙亥十二月遣使納降表直學士髙應松辭草表乃以京局官劉褒然權直院草之自賈似道喪師後至今十餘月國事危急將士離心兵出屢衄朝廷方理僉科場明堂等事士大夫陳乞差遣士人覬覦恩例一籌不畫及是束手無措乃議納土永為小國賫降表奉使燕京哀哉詔罷兵宋太皇太后詔文天祥罷兵詔曰卿之忠義朕已素知見今遣使請和卿宜自靖自獻慎勿生事乃所以保全吾與嗣君也天祥捧詔號泣於是不敢出師矣罷團結乙亥十二月宋太皇太后詔民兵罷團結太后詔南北講和京城內外民兵罷團結三省榜諭京城百姓兩宫慈仁保全生靈南北見議講和毋致惶惑二王航海丙子正月十二日命秀王與擇奉皇兄廣王是皇弟益王昺出宫航海宜中夜遁陳宜中十月再相國事亦危矣至丙子正月十八日大兵至皋亭山要以相見宜中夜遁十九日以賈餘慶為右丞相吳堅為左丞相謝堂樞密使家鉉翁參知政事劉岊同知樞密院事是時宜中遁文天祥辭右相不拜遂以賈餘慶為右丞相朝廷愈無統矣文魁辭相丙子正月十九日除文天祥右丞相兼樞密使天祥辭不拜除資政殿大學士北師邀當國者相見執政侍從交贊公出天祥曰國事至此吾不得愛身辭相印不拜以資政殿學士行天祥至皋亭山伯顔丞相引見天祥抗辭慷慨議論不屈遂留之不使歸南遣王千户館伴京城歸附丙子正月二十日大兵入臨安府太皇太后請降太皇后詔江南諸郡歸附詔云今根本已撥諸城雖欲拒守民何辜焉詔書到日其各歸附庶幾生民免遭荼毒賈餘慶令學士院降詔俾天下歸附之各付一省劄惟家鉉翁不肯署押吳堅一如賈餘慶之命程鵬飛作色欲縛鉉翁鉉翁云中書無縛執政之理歸私廳以待程竟不敢誰何朝廷自乙亥十二月至丙子正月信使往來和議未決正月二十四日北使請宰執親往燕京朝覲於是以吳堅賈餘慶家鉉翁劉岊文天祥五人為祈請使朝廷百官或在或遁至是為之一空二月初一日伯顔丞相指揮收京城軍器十二日索宫女內侍樂官諸色人等宫人赴蓮池死者甚衆二十日北使請三宫北遷二十二日宋少帝令太后隆國夫人黃氏朱美人王夫人以下百餘人從行福王與芮參政謝堂髙應枀駙馬都尉楊鎮臺諌阮登炳鄒珙陳秀伯知臨安府翁仲德等以下數千人太學宗學生數百人皆在遣中惟太皇太后以疾留大內潭州死節丙子正月大兵破潭州李芾守潭竭力備禦凡八九月其間出戰屢捷而大兵之攻日增芾不能支城破之日命積薪樓下於是携家人盡登樓大宴積金銀於兩畔李與館客廟坐其餘列坐左右數杯後命喚二劊子來既至則令將此金銀去與你家口取法刀來一不肯受一會意徑受之携去分付家人後須臾將法刀至李帥呼之至前分付先從頭殺入到尾殺我待我點頭時下手復飲酒良久點頭惟館賔與一妾墜樓而走妾折一足最後李帥伸頭受刃此劊子遂四面放火自刳其腹而死潭州陷衡州茶陵軍袁州相繼而下後李兩山有詩題潭州驛懷李肯齋曰天運由來有廢興義無兩大一身輕封疆社稷若不死婦女鬚眉何用生紐解三綱重接續灰寒萬劫獨光明便當配食三閭廟啓迪民彛開太平三閭水死肯齋火死吉州歸附丙子二月大兵至吉州權城同天驥以城降宋都反元帥大兵循浙東至嚴州知州方回降至台州知州楊必大降至處州知州梁信降衢婺等州並下揚州死節丙子五月廣王登極除李庭芝為右丞相六月庭芝棄揚州引兵至泰州欲航海至福州大兵追及之庭芝凡戰數合大敗遭擒元帥斬庭芝于軍前八月大兵攻淮東破揚州朱煥以城獻薑才死之薑才淮之猛將前後主將皆其人也薑才屢戰大捷大戰三日薑才身生九疽不可挂甲遂敗至泰州被執不肯降臨刑含血罵聲不絶口淮人言之無不傷歎錢塘遺事卷八
