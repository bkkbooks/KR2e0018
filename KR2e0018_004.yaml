body:
  text: 錢塘遺事卷四元劉一清撰北兵渡江開慶己未秋九月北朝憲宗皇帝親率大軍入蜀勢欲順流東下一軍自大理因斡腹南來厯雍桂之境以至靜江府廣帥李曾伯閉門自守北兵遂至潭州一軍渡江自隨黃圍鄂州陷漣水軍揚州大震時相匿報朝廷若罔聞吳潛涕泣入告理宗皇帝以賈似道為荆湖宣撫策應大使進兵援鄂州尋自軍中拜右相趙葵為樞密使江東西宣撫策應大使屯兵信州過廣右遏腹之師以杜庶帥兩淮以向士璧帥潭適南來二哥元帥遇宋候騎而死潭圍先解以高逺印應飛守鄂賈似道駐漢陽軍為聲援又命崔彥良以兵三千援隆興時趙葵移司隆興城門守備戒嚴崔兵至城下不得入扺暮報北兵至生米市距城三十里彥良渡江迎敵得捷保隆者彥良之功彥良崔福子也議遷都己未北軍破江州瑞州衡州進圍潭州邊報轉急都城團結義勇招募新兵築平江紹興慶元城壁議遷都謝皇后請留蹕以安人心上乃止陰許嵗幣開慶己未北兵渡江之後㑹憲宗皇帝晏駕於釣魚城下似道乘機遣使陰約許納嵗幣兵解而去鄂渚兵退乃庚申三月三日也北兵之圍鄂也城危在頃刻都統張勝登城諭之曰城子已是你底但子女金帛皆在將臺可從彼去北兵盡東勝於是焚燒城外民居巋然一壘外援至悉力防守遂克完城行打算法賈似道忌害一時任事之閫臣行打算法以汚之向士璧守潭費用委浙西閫打算趙葵守淮則委建康閫馬光祖打算江閫史岩之徐敏子淮閫杜庶廣帥李曽伯皆受監錢之苦史亦納錢而妻子下獄徐李杜並下獄杜死而追錢猶未已也時江東謝枋得率鄧傳二千人舉義擢兵部架閣科降招軍錢給義兵米似道打算招軍錢开徵所得米枋得自償萬楮餘無所償乃上書賈相云千金為募徙木將取信於市人二卵而棄干城豈可聞於鄰國乃得免丁相罷政己未北兵渡江時丁大全當國匿報不以上聞誤國欺君十月罷相大全鎮江人藍色鬼貌小官時為戚里婢壻夤緣取寵位媚事內侍虞允升董宋臣上信任之擢監察御史遷右正言在臺橫甚引小人沈翥方大猷為羽翼輒登相位己未十月罷相庚申七月謫貴州與州將游翁明失色杯酒間適游有食人之謗經帥朱祀孫伺丁者也憲李仲鰲惡游者也丁密以郡人之謗游者語李李以語朱朱以責游游遂告丁異謀以為陰造弓矢將通蠻為不軌朱聞于朝加竄新州經司遣畢進武遷者下貴州退其奴且盡取其橐中所有而後寬之舟過藤州太守以下不敢與通畢遷登岸詣州借水手十人適丁遣舟人請鐔津何權孫者過舟中談話日午畢將登舟何别去未至孫舟人走報丁副使溺矣州為求尸至夜始得巾履未脫解事人申州借錢買棺守以經司無名色錢百千豫之丁大全喪受云價不問多少自償既斂郡與解者俱申經司牒下追畢究問後有㫖許自便居住畢遷于靜江既而朱先遣之回長沙矣夫人范氏母子居建康之村落賈相屢誘其子使自陳掉頭竟不就先是謝方叔罷相居隆興賈相誘之曰上念公不忘信之遂刻穆陵御筆以進且獻丹砂等物臺章交上有㫖追逮空所有以解幸免於禍丁之父子智於謝逺矣吳潛入相丁大全罷吳潛代之潛為人豪俊其弟兄亦無所附麗有讒于上者曰外間童謡曰大蜈蚣小蜈蚣盡是人間業妄蟲夤緣攀附有百尺若使飛天能食蟲此語既聞惑不可解而用之不堅亦以此也庚申七月謫建昌尋徙潮州辛酉四月安置循州壬戌五月十八日卒捐館之夕作詩云伶俜七十翁間關四千里縱非烟瘴窟自無逃生理去年三伏中葉舟遡潮水燥風扇烈日熱喘乘毒氣盤回七二灘顛頓常驚悸肌體若分裂肝腸如搗碎支持達循州荒凉一墟市託跡貢士闈古屋已頽圯地濕暗流泉風雨上不庇蛇鼠相交羅螻蟈聲怪異短垣逼閭閻簾楹接尺咫凡民多死喪哭聲常四起妻或哭其夫父或哭其子爾哭我傷懷傷懷那可止悲愁復悲愁憔悴更憔悴陰陽冦乘之不覺入腠理雙足先蹣跚兩股更重膇擁腫大如椽何止患跖盩淫邪復入腹喘促妨卧寐脾神與食仇入口即嘔噦膏肓勢日危和扁何為計人生固有終蓋棺亦旋已長兒在道塗不及見其斃老妻對我啼數僕環雪涕綿蕞斂形骸安能備喪禮孤柩倚中堂几筵聊復爾骨肉逺不知鄉里各周慰相慰亦何言眼眼自相視龍川水泱泱敖山雲委委雲飛何處歸水流何處止悠悠旅中魂雲水兩迢遞朝廷有至仁歸骨或可覬魂兮早還家毋作異鄉鬼又自銘其棺云生於霅川死於龍水大布深衣緇冠素履藉以紙衾覆以布被一物不將斂形而已其人伊誰履高居士翁嘗好老莊善延方外㕛與客談及死生事曰某只消一個倐然而逝時但以為戲言及至循枋國者所遣人迫翁已甚翁處之裕如作詩及銘之夕忽空中雷聲轟然翁形在而神去矣先是潛入相以方甫胡易簡為腹心二人輕儇人嘲之曰易簡方上議立度宗為太子公意不欲緩其事上不悅北軍退即罷政而似道由軍中入相諷臺臣劾公罪貶循州先是詔似道移司黃州黃在鄂下流中間乃北騎往來之衝要似道聞命以足頓地曰吳潛殺我疑移司出潛意故深憾之遣武人劉宗申為循守欲毒潛潛鑿井卧榻下自作井記毒無從入一日宗申開宴以私忌辭又宴又辭又次日移庖不得辭遂得疾而卒賈相當國理宗之季官以賄成宦官外戚用事似道為相年餘逐巨璫董宋臣李宗輔勒戚畹歸不得任監司郡守百官守法門客子弟斂迹不敢干政人頗稱其能然天資陰忮刻深置緑匱招人告訐立七司法苛密煩碎議者不以為便李璮歸國李全死後其子松夀據有山東駸駸踰淮據及漣水連年為患景定庚申八月忽有書貽賈相係兩淮制置李庭芝繳進往復十數始疑中信其終則直壬戌詔改漣水軍為安東州乃降德音特授李璮保信武寧軍節度使督視京東河北等路軍馬齊郡王宣賜奬諭追復其父李全官爵改正日厯御製詩賜賈相云力扶漢鼎賴元勳泰道𢎞開萬物新聲暨南郊方慕義恩漸東海悉來臣凱書已奏三邊捷廟算潛消萬里塵坐致太平今日事中興玉厯喜環循嚴覆試賈似道嘉熙戊戌以其姊貴妃之故得赴廷對是時貴妃在大內廷對之日節次當事人供奉湯藥飲食自庚申入相之後躐拜平章聨科必嚴過省及覆試之禁或為詩末聨云戊戌若還嚴覆試如今安得有平章其意甚當一擔擔庚申賈似道初入相或為詩曰收拾乾坤一擔擔上肩容易下肩難勸君高著擎天手多少傍人冷眼看殺向士璧向士璧帥長沙北兵已圍鄂嶽方措置間皮泉渌家居訪之問所以為守城之計向曰正為眼中無可任之人皮恚之北兵至向親率軍民且戰且守既置飛虎軍又募斗弩社朝夕親自登城慰勞卒能保潭斗弩之力居多皮入朝百計毁短似道妬賢嫉能乃嗾臺諫孫附鳳劾之辛酉詔奪向士璧從官恩數令臨安府追究侵盜掩匿情節竟坐遷謫擠之死地天下寃之劉整叛北劉整以瀘州降北先是鄭興守嘉定被兵整自瀘州赴援興不送迎亦不宴犒遣吏以羊酒餽之整怒杖吏百而去及興為蜀帥而瀘州乃其屬郡興遣吏打算軍前錢糧整賂以金瓶興不受復至江陵求興母書囑之亦不納整懼又似道殺潛殺士璧整益不安乃以瀘州降北軍壓境整集官吏喻以故曰為南者立東廡為北者立西廡官吏皆西立惟户曹東立殺之與西立二十八人歸北京湖制置吕文德復瀘州文德號為黑灰團整歸北上急攻緩取之書謀取襄陽曰南人惟恃一黑灰團可以利誘也乃遣使于文德求置𣙜場於樊城外文德許之使曰南人無信安豐等處𣙜場或為盜所掠願築土墻以護貨物文德不許使辭去或謂文德曰𣙜場成我之利也且可因以通和好文德以為然追使者不及既而使者至復申前議文德遂許焉為請於朝開𣙜場於樊城外北人築土墻於鹿門山外通互市築堡襄帥吕文煥知被欺犯兩申制置司為親吏陳文彬匿之北人又於白鶴城垣築第二堡文煥復申制司文德大驚頓足曰誤朝廷者我也即請自赴援會病卒拘留北使賈似道陰許北朝嵗幣故鄂渚退師自事定之後冒為已功諱言前事及北使郝經來尋盟似道拘留真州不遣其失信北朝以至召兵雪詞賈相當國陳藏一作雪詞譏之詞曰沒巴沒鼻霎時間做出漫天漫地不論高低并上下平白都教一例鼓動滕神招邀巽二一任張威勢識他不破只今道是祥瑞却向鵝鴨池邊三更半夜誤了吳元濟東郭先生都不管關上門兒穩睡一夜東風三竿暖日萬事隨流水東皇笑道山河元是我底詞名念奴嬌案詞名念奴嬌五字依說郛補入紫原三策咸淳年間汪紫原立信於襄危之際以書抵賈相陳三䇿一謂內地何用乎多兵宜盡抽之以過江可得六十萬百里或二百里置一屯皆設都統七千里江面才三十四屯設兩大藩府以總攝運掉之緩急上下流相應必無能破吾聨絡之勢者久之日益雖進亦可二謂久拘使者在京湖何益不如遣使偕行啖以厚利緩其師期年嵗間我江外之藩垣成氣象固且江南之生兵日益矣三謂若此兩說不可行惟有准備投拜其意蓋以激賈行二說也賈得書大怒曰瞎賊敢爾妄語迄諷臺諌罷紫原歸金陵不數月北兵渡江九江以下皆失守乃以端明招討起公則已無地席矣紫原以家囑愛將金明而令金明以子從之過淮時賈出督相遇拊紫原背而哭曰端明端明某不用公言遂至此紫原對云平章平章今日瞎賊更說一句不得賈問紫原何䇿對曰今江南無一寸乾淨地某去尋一片趙家土上死也要死得分明後抵高郵適巴延丞相經蹕紫原之家有告以紫原曽獻三策於賈者丞相驚嘆江南有這般人這般話若遂用吾安得至此即尊禮其家老小甚至欲發兵迎取之金明不敢告以在高郵而密價以報紫原拊案大哭曰吾猶幸得在趙家地上死也竟大慟而絶時人有詩曰厚我藩垣長彼貪不然銜璧小邦男廟堂從諌真如轉竟用先生策第三錢塘遺事卷四
