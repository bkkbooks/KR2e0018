body:
  text: 錢塘遺事卷七元劉一清撰下蘄黃州德祐乙亥正月北兵順流而下松江諸將多吕氏部曲望風降附至黃州陳奕以城降奕始謂大兵以襄漢船自漢入江乃知大兵未渡而蘄黃已先降故其渡也襄漢蘄黃之船皆在焉至蘄州管京模以城降至南康軍葉閶以城降劉整死正月初七日劉整死初整與文煥分兵南渡及是整無功發憤得疾死於無為軍城下下江州正月十三日下江州九江江西屏蔽也錢真孫以帥兼守舉城以降則江西一路如破竹矣嘗記宋太祖以乙亥年命曹翰取江州後三百年乙亥而失之豈非數歟吕師䕫以大元命知江州下安慶大元國兵至安慶府范文虎以城降文虎吕氏壻也賈似道奏云文虎為趙縉所憤激而以安慶叛而不知文虎與吕氏係親黨也賈相出師甲戌十二月以賈似道為都督軍馬黃萬石李珏參贊軍事檄召諸路軍兵聽督府調遣於封樁庫撥金十萬兩銀五十萬兩關子一千萬貫充都督公用時邊報轉急似道猶未有行意聞劉整死乃議出師乙亥正月十五日似道上出師表略曰臣以老病之身遭時多艱豈復能以驅馳自勉云云每念身雖危可以奮勵振事雖急可以激烈圗云云逆整世受國恩一旦反噬而仇視我役役貪生畏死視便則趍天亦何有於彼哉自襄有患五六年間行邊之請不知幾疏先帝一不之許襄陷郢單臣憂心孔疚請行又不知其幾疏先帝復不之許頃罹孔棘詔既奪情臣辭亦不知幾逮不獲命竊自附於金革無避之義陛下踐阼以來邊劇日駭臣請悉力政以江流數千里江面數十屯而脉絡不貫非臣督視隨機上下是必有不遏其渡江者今不幸臣言中矣而使先帝以及兩宫下至公卿大夫士早以臣言為信聽臣之出當不使如此往者不可諌及今汲汲圗之恨其晚尚可強臣之留耶臣留不過使都民茍安旦暮而非所以為京社大計也陛下惟命臣以王導故事都督中外諸軍然兵入吾境亦既兼旬臣苦心處置忘寢廢食未能少強人意誠以注的之矢難留在目之機易見與其坐待其來於事無補孰若使臣決於一行以求必勝事理較著有不難知者恭惟祖宗三百餘年德澤其來未艾兩宫仁慈孝愛動無闕失臣恃此咸發信順之心斷可憑藉以辦此事臣羸弱之軀非不知自愛云云孤忠自誓終始以之臣有三子三孫留之京師日依帝所以示臣無復以家為意否則茍免而已寧不愧死於斯言哉深切迫切拜表即行遣使請和德祐乙亥正月十七日賈似道遣宋京使軍前請和京與北使來要似道自往似道遣阮思聰束元嚞代行思聰回知事不就惶怖失據隂備快船為走計時大軍人勢衝下南北兩岸立炮座設划車中流數千艘乘風直進宋兵不敵夏貴老將也既失長江惟恐督府成功無所逃罪又恐孫虎臣新進位出已上殊無鬭志下饒州乙亥正月大兵至饒州守臣唐震竭力守禦城破震為北兵所害死於州治之玉芝堂二十一日城破二十七日塢判官始得其遺體溫然如生遂具衣冠而葬之前丞相江萬里寄居饒州州人皆遁萬里坐守以為民望兵入其第赴水而死萬頃自南康來省兄遇兵不屈遂以磔死至死罵聲不絶口先是張世傑至饒州萬里與之大醉世傑曰國事如此丞相如何萬里曰力不能以報朝廷惟有死爾世傑曰丞相之言是也他家事世傑盡知之拿一個盞跪在地不能得他接接了未能得他飲安能忍辱事他人耶吾盡吾職分延得一日也是趙家一日之天下如不可為亦只有一死庶幾可見趙皇於地下觀此則萬里從容就義之心先决矣破池州乙亥正月大兵破饒州遂至池州時池州無守臣蜀人趙昂發為池州倅權州事措置備禦等官謂昂發曰州不可守不如棄之昂發曰吾守土臣也豈可偷生避死也大兵至留詩其第夫婦遂自經而死時人語之曰臣為君死妻為夫亡蕪湖潰師乙亥正月二十二日賈似道潰師于蕪湖是日三鼓孫虎臣告急至似道舟中泣告曰追兵已迫夏貴亦曰彼衆我寡委難抵當垂泣而去似道撫諭三軍遂許唱轉官資諸軍詬曰要官資做甚己未庚申官資何在鳴鑼一聲退兵於珠金沙十三萬軍一時潰散督府之師已失似道奔入揚州李庭芝閉城不納姜才敗績大兵順流乘勢至瓜州揚州都統姜才出兵二萬餘于揚子橋士氣百倍衆皆披靡時彼衆我寡相持半日凡數十戰勝負未分生兵日增乃至敗績姜才稍引兵還大兵入太平州守臣趙之溍遁金山之敗大兵入建康府松江制置知建康府趙溍遁北兵方入城時察院潘文卿按趙溍取行宫公帑所積金帛棄城而遁建康為江東重鎮則江東之勢去矣北兵駐建康府不進遣哨騎四出大兵至鎮江府張世傑趙溍戰于金山世傑多海舟無風竟不可動遂敗留守司參軍沈圻自柂樓上望下嘔血而死守臣洪起畏遁嗚呼京口第一重門户而失之行闕岌岌矣趙與可遁乙亥正月大兵入寧國府守臣趙與可遁與可宗室也而望風宵遁朝㫖除名勒停追毁出身以來文字以為不守封疆者之戒北兵下徽州二相遁去乙亥二月二十六日左丞相王爚去先是賈似道奏請遷都太皇太后不許及是殿前指揮使韓震再申前請爚議堅壁固守求罷不允徑去三十日夜右丞相章鑑遁二相去國朝廷事可知矣誅韓震乙亥三月初一日誅韓震三省奉聖㫖云韓震身為殿岩陰懷異志當此危急不肯出戰聲言提兵䦨入禁闕奸謀叵測罪不容赦國人皆曰可殺吾念其父有功于蜀不料其子負國若此除已明正典刑罪止其身若家屬親黨决非同謀一切並為免罪時有言震謀脅遷都者宜中與客潘希仁議請計乃伏甲士於樞密府擊殺之以步軍指揮使領其衆震部曲百餘人聞變大閧而入射火箭入大內又以大刀斫嘉會門宜中遇兵遂之奔建康府五木之敗北兵入常州時三月初二日知州王宗洙遁權守節幹王良臣以城降五月張彥劉師勇復常州王良臣敗走又復廣德軍九月王良臣以北兵攻常州知州姚訔統制劉師勇王安節拒守攻城不克十月常州告急文天祥遣將尹玉朱華張全麻士龍赴援二十六日戰于橫林敗績二十七日戰于五木敗績張全不發一矢尹玉麻士龍死之天祥調兵再往道不通十一月十六日常州糧盡劉師勇以騎突圍出奔平江府遂破常州屠其城知州姚訔死之生獲王安節不屈而死訔乃姚希得之子安節乃節度王堅之子尹玉江西憲司將也與北兵戰殺數千人復收殘兵五百又角一夕兵敗手殺七八十人遂死之其麾下與北兵戰併死無一降者朝廷贈濠州團練使官其二子常州自三月二日陷至五月再復九月北兵再至知府姚訔糾集民義登城巡視旌旗雲擁鼓聲震天潛遣劉師勇王安節等出師迎敵大捷次日北兵至城下開門引戰二陳夾擊攻城之兵為其掩殺攻城不克而遁劉師勇又於歸路設伏以待之殱者過半常州雖能保城而管下屬縣屋宇焚蕩人民虜掠殆盡生獲百姓殺之臠其肉煎油作炮擲入常州城下使膏油散在牌杈木上積日使火箭射之牌權自焚又俘其人使之運土於城外築堡傾泥併其人填之常州屬縣之民遭此橫禍十一月糧盡城始破嗚呼使北兵渡江之後一州州有守臣如姚訔者忠於國家而死守封疆宋鼎又安得而轉移耶朝臣宵遁乙亥正月京師戒嚴朝臣接踵宵遁大軍已迫畿甸勤王兵不至人情恟恟知臨安府曾淵子兩浙運副自遁浙東提舉王霖龍遁機政文及翁倪普臺諌潘文卿季可陳過徐卿孫侍從已下陳堅何夢桂曽希顔數十人並遁朝中為之空疏朝堂榜云孟軻謂君視臣如草芥則臣視君如國人又謂諌於其君而不聽去則窮其力而後止識者猶以為非君臣之正誼我朝三百餘年待士大夫以禮吾與嗣君遭家多難爾小大臣未嘗有出一言以救國者吾何負於汝哉今內而庶僚畔官離次外而守令委印棄城耳目之司既不能為吾糾擊二三執政又不能倡率羣工方且表裏合謀接踵宵遁平日讀聖賢書自諉謂何乃於此時作此舉措或偷生田里何面目對人言語他日死亦何以見先帝天命未改國法尚存可令尚書省别具見在朝臣在京文武並與特轉二官其負國弃豫者令御史臺覺察以聞其榜朝堂明吾之意罷賈似道乙亥三月三日賈似道罷平章都督豫祠制曰大臣具四海之瞻罪莫大於誤國都督行諸軍之事律尤重於喪師告九廟以奉辭詔羣工而總命具官賈某小材無取大道未聞昔相穆陵徒以邊將而自詭逮事先帝遂於國事以獨専謂宜開誠布公以扶皇極之彞并謀合智以盡天下之議而乃恣行胸臆不恤人心以吏道沮格人材以兵術剸裁機務括田之令行而農不得安於野𣙜利之法變而旅不願出其途矧當任閫之驅馳豈不戎事之緩急戰功或曠嵗而不舉兵事或臨時而不修纖悉於文法之搜求濶疏於邊政之科瑣遂令飲馬以渡長江乃者抗表出師請身戡難人方期以孔明之志朕亦責以裴度之功謂當被髮纓冠而疾趨乃復二矛重弓而容與三軍解體百將離心彼被甲之謂何未聞聲而先潰孟子謂吾何畏彼左氏謂我不丈夫社稷之勢綴旒縉紳之言切齒姑與薄罰俾爾閒祠於戲膺戎狄懲荆舒今欲復周公之事放歡兜殛伯鯀尚思寬虞典之誅可罷平章軍國重事都督諸路軍馬十四日賈似道遺堂吏翁應龍護都督印歸朝上表自劾五月太后乃降詔令李庭芝宣意略云卿其亟歸喪次以盡臣子之道當曲示保全否則衆論益甚忠孝靡容吾雖欲屈法伸恩而不可得卿其明聽吾言善終以始亦有辭於永世左相王爚奏陛下念其勤勞三朝免於追竄使之歸里終喪忠厚之至既數辭矣安坐維揚未聞就道既不能死忠又不能盡孝遂使公論切齒愈甚願降一明詔切責似道又犯方命之罪貶賈似道乙亥七月十二日合臺奏賈似道喪師誤國內批賈似道専權誤國得罪公論吾以其厯事三朝近嘗許以終制不欲已甚合臺露章未已更與降三官改徙鄰郡少弭人言賈似道婺州居住廖瑩中王廷追毁文字除名勒停送韶州羈管內批王廷曾淵子改送雷州居住賈似道降三官改送建寧居住翁合奏賈似道以妬賢無比之林甫輒自託於伊周以不學無術之霍光敢效尤於莽操其總權罔上賣國召兵専利虐民滔天之罪人人能言云云首聞邸報臺諌交章聲其奸謀乞行逺竄迫於衆怒僅謫建寧雖國家之典憲未伸而朝廷之意向稍白臣切伏惟建寧實朱熹講道之闕里雖三尺童子粗知向方聞似道且嘔惡唾去况可見其面如熹釋大學一章曰放惡不逺彼且稔惡所伏其地其民何罪必以禦魑魅而後已夫與之同中國且不可而可一日同此鄉必放之此鄉此鄉亦獨何罪巷伯惡惡之詩曰投畀有北有北不受而終曰投畀有昊蓋有北决所不受則付與昊天惟天得制短長六合爾此則陛下事也乞將似道逺竄深廣以伸國法以謝公論有㫖賈似道移漳州責授高州團練副使下臨安府台州簿録其家相陳宜中乙亥三月初三日陳宜中參知政事陳合僉書樞密院召王爚還朝初十日陳宜中除右丞相初四日宜中辭相奏云臣今月初四日恭準內批不許臣辭免新除特進右丞相恩命念臣一介朴愚不喜矯飾此番出位奉行陛下如神之斷將順陛下如天之仁實出於愛君憂國之血忱非有一毫傾人利已之私念髙天厚地實所鑒臨今若許臣以舊官備位人猶謂臣無所為而為之可以少逭清議若不先不後於此易變恩榮公論無情何所不至或謂臣乘時傾似道而奪其權或謂臣拱手不留臣鑑而據其位臣既無面顔立於百僚之上亦安能復有精神念慮能為陛下宣一日之勞哉魯港敗後宜中當國首斬韓震脅遷之議差强人意宜中實無經綸至秋托故遁歸及不得已十月再來則國事去矣錢塘遺事卷七
