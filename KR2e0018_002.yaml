body:
  text: 錢塘遺事卷二元劉一清撰淳熙盛事宋孝宗御宇髙宗在德壽光宗在青宫寧宗在平陽邸四世本支之盛亘古未有楊誠齊時為宫僚賀光宗誕辰詩云祖堯父舜真千載禹子湯孫更一家讀者服其精切又云天意分明昌火德誕辰三世總丁年蓋髙宗生於丁亥孝宗生於丁未光宗生於丁卯也丁年字出李陵書借用亦佳孝宗恢復髙宗之朝有恢復之臣而無恢復之君孝宗之朝有恢復之君而無恢復之臣故其出師才遇少衄滿朝爭論其非屈已請和而不能遂孝宗之志惜哉辛幼安詞辛幼安晚春詞云更能消幾畨風雨匆匆春又歸去惜春長怕花開早何况落紅無數春且住見說道天涯芳草無歸路怨春不語算只有殷勤畫簷蛛網盡日惹飛絮長門事准擬佳期又誤蛾眉曽有人妬千金縱買相如賦脉脉此情誰訴君莫舞君不見玉環飛燕皆塵土閒愁最苦休去倚危欄斜陽正在烟柳斷腸處詞意殊怨斜陽烟柳之句其與未須愁日暮天際乍輕隂者異矣使在漢唐時寧不賈種豆種桃之禍哉愚聞壽皇見此詞頗不悅然終不加罪可謂至德也已其題江西造口詞云鬱孤臺下清江水中間多少行人淚西北是長安可憐無數山青山遮不住畢竟東流去江晚正愁豫山深聞鷓鴣蓋南渡之初敵人追隆祐太后御舟至造口不及而還因此起興聞鷓鴣之句謂恢復之事行不得也又寄丘宗卿詞云千古江山英雄無覔孫仲謀處舞榭歌臺風流總被雨打風吹去斜陽草樹尋常巷陌人道寄奴曽住想當年金戈鐵馬氣吞萬里如虎元嘉草草封狼居胥贏得倉皇北顧四十三年望中猶記烽火揚州路可堪回首佛狸祠下一片神鴉社鼓憑誰問亷頗老矣尚能飯否此詞集中不載尤雋壯可喜朱文公云辛幼安陳同甫若朝廷賞罰明此等皆可用東窗事發秦檜欲殺嶽飛於東窗下謀其妻王夫人曰擒虎易放虎難其意遂决後檜遊西湖舟中得疾見一人披髮厲聲曰汝誤國害民我已訴於天得請于帝矣檜遂死夫人思之未幾秦熺亦死方士伏章見熺荷鐵枷因問秦太師所在熺曰吾父見在酆都方士如其言而往果見檜與万俟卨俱荷鐵枷備受諸苦檜曰可煩傳語夫人東窗事發矣慶元侍講宋慶元初趙子直當國召朱文公為侍講文公欣然而至積誠感悟且編次講義以進寧宗喜令㸃句以來他日請問上曰宫中常讀之大要主求放心耳公因益推明其說曰陛下既知學問之要願勉强而力行之退謂其徒曰上可與為善若舉得賢者輔道天下有望矣然是時韓托胄自謂有夾日之功已居中用事公因進對面諫又約吏部侍郎彭子壽請對白發其奸且以書白趙丞相云當以厚賞酬其勞勿使干預朝政托胄於是謀逐公忽一日御批云朕閔卿耆老當此隆冬難去講已除卿宫觀內侍王德謙徑遣付下宰相執奏臺諫給事爭留皆不從時子壽出護使客回則公已去矣即上章攻托胄云昔元符間向宗良弟兄止緣交通賔客論泄機密陳瓘上章劾之謂自古戚里侵權便為衰世之象外家干政即是亡國之本亦如州縣之政只要權出守令若子弟親戚交通關節則姦人鼓舞良民怨咨此言不可不察今托胄所為不止如宗良而朝無陳瓘莫能出力排之在太上皇朝始用姜特立大臣尚能逐之使去復用袁佐諫官尚能論之使懼不謂陛下始初清明有臣如此乃無一人敢出狂語則其聲勢可知矣上謂宰相曰托胄是朕親戚龜年是朕舊學極是難處宰相進兩留之說且謂龜年性剛乞宣諭留之上曰此人質直兼是隨朝舊僚四人兩人罷一人憂去只有龜年有事肯來說如此區處甚好其晚忽降省劄直批彭龜年豫郡宰相亦不知也自是衆君子皆逐矣上始初雖為托胄所誤然三十一年敬仁勤儉如一日天文示變齊心露禱禁中酒器以錫代銀上元夜嘗熒燭清坐小黃門奏曰官家何不開宴上愀然曰爾何知外間百姓無飯喫朕飲酒何安嘗幸聚景園晚歸都人觀者爭入門蹂踐有死者上聞之深悔自是不復出文公格心之效終不可泯韓平原宋寧宗既受禪韓平原所望不過節鉞知閣劉弼嘗從容告趙忠定曰此事托胄不為無功亦須分些官職與他忠定不答由是漸有邪謀迄逐衆君子余友趙從道有詩云慶元宰相事紛紛說著令人暗斷魂好聽當時劉弼語分些官職與平原余亦作一篇齊壇一鉞底須慳坐見諸賢散似烟不使慶元為慶厯也由人事也由天趙子直韓平原傾趙子直罷政逺竄薨於湘酃訃聞有無名子作詩大書于朝天門下云兩手旋乾復轉坤羣邪何事肆流言狼胡跋疐傷周旦魚腹銜寃葬屈原一死固知公所缺孤忠猶賴史長存九原若見韓忠獻休說渠家末世孫韓平原客韓平原嘗為南海尉延一士人作館客甚賢而文既已音問杳不通平原當國常思其人一日忽來上謁蓋已改名登第數年矣一見歡喜館遇極厚嘗夜䦨酒罷平原屏左右促膝問曰某謬當國秉外間議論如何其人太息曰平章家族危如疊卵矣尚復何言平原愕然問故對曰是不難知也椒殿之立非出於平章則椒殿怨矣皇子之立非出於平章則皇子怨矣賢人君子自朱熹彭龜年趙汝愚斥逐貶死不可勝數則士大夫怨矣邊釁既開三軍骸骨孤兒寡婦之哭聲相聞則三軍怨矣並邊之民死於殺掠內地之民死於科需則四海百姓皆怨矣叢是衆怨平章何以當之平原默然久之曰何以教我其人辭謝再三固問乃曰僅有一䇿主上非心黃屋若急建青宫間陳三聖家法為揖遜之舉則皇子之怨可變而為恩而椒殿退居德壽雖怨無能為矣於是輔佐新君渙然與海內更始曩時諸賢死者贈恤生者召還遣使聘北釋怨請和以安邊境優犒諸軍厚恤死士除苛解撓盡去軍興無名之賦使百姓有更生之意然後選擇名儒遜以相位乞身告老為緑野之遊則易危為安轉禍為福矣或者其庶幾乎平原猶豫不能决欲留其人處以掌故其人力辭竟去未幾禍作濟王濟王已廢潘壬潘丙謀立王遺書李全約以二月望日舉事為邏卒獲其行人并書以白彌逺彌逺易書以二月改作三月且許行人以美官重賞令其以書達全二月潘壬潘丙率太湖亡命數十人各以被半䄂為號乘夜踰城而入至邸索王言推戴事王聞變易敝衣匿水竇中久而得王擁至州治以黃袍加身王號泣不從不獲已與之約曰汝能勿傷太后官家否衆許諾遂發軍資庫金帛楮劵犒軍命守臣謝周卿率見任寄居官入賀且揭李全榜于州門言史彌逺廢立等罪且稱見率精兵二十萬水陸並進人皆聳動以為江東狡謀比曉王視其士卒則太湖漁人巡尉弓兵而已王知其謀不成乃與郡將州兵戰之其數元不滿百也王元春以輕舟告變於朝史彌逺急召殿司將彭忳赴之兵至而事已平矣乃班師時全守淮安知所約失時遂叛歸北史彌逺欲殺濟王遣其客秦天賜來且頒宣醫視疾之命時王已無疾天賜諭上意逼王就死遂縊于州治尋下詔貶王為巴陵郡公其後魏了翁真德秀洪咨䕫潘枋相繼上疏咸言其寃大理評事胡夢昱應詔上書言濟王之不當廢引用晉太子申生漢戾太子及秦王廷美之事凡數百餘言訐直無忌彌逺怒竄夢昱于象州紹定壬辰沛恩宥過夢昱已不及矣贈朝奉諡剛簡仍官其子三京之役寶慶乙酉趙葵趙范全子才奏因降人谷用安之言欲乘時撫定中原建守河據關之議以聞于朝乃命起范開閫於光黃之間六月全子才合淮南兵萬餘人赴汴以十二日離合肥七月二日抵東京距城二十里駐兵五日整兵入城行省李伯淵先期以文書來降願與谷用安范用吉結約乃殺所立崔立率父老來降先是黃河南舊有寸金淀乃為金人所决河水淫溢自壽至汴水深齊腰行役良苦子才駐汴以俟糧嵩之主和中沮之不肯運糧卒致誤事南滁州路鈐樊辛路分王中以偏師下鄭州陳州蔡州望風歸附趙葵以淮西兵五萬取泗州由泗至汴與子才軍㑹因謂子才曰我輩始謀據關守河今已抵汴半月不急議攻洛陽潼關奚待耶子才以糧餉未集對趙葵益督促之遂檄范用吉樊辛李先胡顯等提軍一萬三千人命淮西師機徐敏子為監軍先令西上且命楊乂以廬州强勇軍一萬五千繼之各路齎五日糧諸軍以糧少為辭敏子以二十一日啓行二十六日遣和州寧淮軍正將張迪以二百人趣洛陽至夜踰城大譟而入城中寂然無應者蓋北軍戍洛陽者皆空其城而誘我矣及曉有民庶三百餘家登城後降迪等遂入洛陽二十七日軍食已竭乃采蒿和麵作餅而食之楊乂至洛東三十里方散坐蓐食忽數百步外有立紅黃凉繖者衆方駭異而伏兵突起深蒿中乂倉卒無備大潰擁入洛水者甚衆乂僅以身免是晚有潰軍奔逬而至云楊乂一軍已為金人大陳衝散今北兵已據北牢矣於是在洛之師聞而奪氣八月一日北軍已有近城下寨者敏子與戰勝負半之士卒乏糧殺馬而食俟糧不至遂班師大字成犬寧宗初政首召真德秀魏了翁諸君子在朝天下人心翕然向化史彌逺欲逐真德秀魏了翁梁成大自薦於史相遂除成大為察院成大貽書所親曰真德秀乃真小人魏了翁乃僞君子此舉大快公論而以成大守建寧拆真德秀宏詞坊茍可以捃托者無所不盡其致矣當時太學諸生曰大字傍宜添一㸃曰梁成犬余謂犬之狺狺不過吠非其主耳是有功於主也今夫不肖之臺諫受權貴之指呼納豪富之賄賂內則翦天子之羽翼外而奪百姓之父母是有害於主也吾意犬亦羞與為伍矣辛卯火宋紹定辛卯臨安之火比辛酉之火加五分之三雖太廟亦不免而史丞相府獨全洪舜俞詩云殿前將軍猛如虎救得汾陽令公府祖宗神靈飛上天可憐九廟成焦土時殿師乃馮榯也人言藉藉迄不免責史彌逺史彌逺開禧丁卯為禮部侍郎自楊太后誅托胄其事甚祕托胄死寧宗不知也居數日上顧問托胄安在左右乃以實對上深悼之彌逺出入宫禁外議譁然有詩曰往來與月為儔侣舒卷和天也蔽䝉蓋以雲譏彌逺也彌逺為相十七年如真德秀魏了翁者皆遭斥逐楊后之事濟王嫉之一日書于几上曰彌逺當决配八千里左右以告彌逺彌逺銜之及寧宗疾革廢濟王而立理宗使潘壬潘丙之謀成彌逺將何所容其身哉理宗之立又獨相九年用余天錫梁成大李知孝等列布于朝最用事者薛極胡矩聶子述趙汝述時號四木及上親政臺諫爭言其非上思其功不忘復進其姪嵩之夾攻遼金紹定辛卯襄帥言陳垓奏金人國遣使約夾攻䝉古壬辰國兵與䝉古兵合圍燕京金義宗自汴京突圍出奔歸德府癸巳闕月遣襄陽太尉江海棗陽帥孟珙以兵至蔡州兵駐城南帥臣史嵩之運糧十萬給南北軍端平甲午正月北兵至蔡州宋孟珙兵先薄蔡城下金主知城必破乃傳位後主閉閣自縊愚嘗謂宋之與鄰國有兩失宋之與遼自真宗澶淵之後以姪事本朝世守歡盟一旦從金人之請議夾攻遼髙麗嘗遣使尋醫託其言以勸中國矣而徽宗不信又啓唇亡齒寒之患矣童貫兵出白溝而無紀律兵抵燕京而即奔潰金人哂之反得以欺我卒致靖康之禍金雖世讐在所當滅真西山言金亡而中國之憂始大洪咨䕫奏金亡必有興者二公有先知之明矣錢塘遺事卷二
