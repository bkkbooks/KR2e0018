body:
  text: 錢塘遺事卷一元劉一清撰髙宗不都建康而都於杭大為失䇿士大夫湖山歌舞之餘視天下事於度外卒至喪師誤主納土賣國可為長嘆惜也觀是書不能無所感云天目山䜟臨安都城其山肇自天目纎云天目山前兩乳長龍飛鳯舞到錢塘海門一㸃巽山小五百年間出帝王錢氏有國世臣事中朝不欲其說之著更其末云異姓王以遷就之髙宗駐蹕其說始驗仰視吳山如卓馬立顧紹興間望氣者以為有鬱葱之符秦檜專國心利之請以為賜第其東偏即檜家廟西則格天閣之故基檜薨熺猶戀戀請以為第常州倅烜為光祿丞留𨽻家廟言者罷烜并遷廟主於建康遂空其室焉高宗倦勤即其地築宫曰德壽後又更曰重華曰慈福曰壽慈凡四易美名至於咸淳甲戌天目山崩則百年王氣亦終於此矣髙宗浙臉髙宗誕之三日徽宗幸慈寧后閣妃嬪捧抱以見上撫視甚喜顧謂后妃曰浙臉也蓋慈寧后乃浙人其後駐蹕於杭州亦豈偶然金陵山水髙宗未駐蹕杭州之先有暫都金陵之意末年因幸建康此意未釋召一術者决之術者云建康山雖有餘水則不足獻詩曰昔年曽記謁金陵六代如何得久興秀氣盡隨流水去空留烟岫鎖崚嶒夢吳越王取故地宋髙宗建炎渡江至德祐丙子過一百五十年紹興八年二月癸亥上發建康戊寅至臨安府遂定議建都自此不復移蹕淳熙十四年冬十一月丙寅宰執奏事延和殿宿直官洪邁同對因論髙宗諡號孝宗云太上時有老中官云太上臨生之際徽宗夢吳越錢王引御衣云我好來朝便留住我終須還我山河待教第三子來邁又記其父皓偕其母來曽在明節皇后閣中言顯仁皇后初生髙宗時夢金甲神人自稱錢武肅王即鏐也年八十一髙宗亦年八十一卜都於錢塘似不偶然孝宗所謂錢王指俶俶第三子惟渲也終團練使十里荷花孫何帥錢塘柳耆卿作望海潮詞贈之云東南形勝三吳都㑹錢塘自古繁華烟柳畫橋風簾翠幕參差十萬人家雲樹繞堤沙怒濤捲霜雪天塹無涯市列珠璣户盈羅綺競豪奢重湖疊巘清佳有三秋桂子十里荷花羌管弄晴菱歌泛夜嬉嬉釣叟蓮娃千騎擁髙牙乘醉聽簫鼓吟賞烟霞異日圗將好景歸去鳯城誇此詞流播金主亮聞歌欣然有慕於三秋桂子十里荷花遂起投鞭渡江之志近時謝處厚詩云誰把杭州曲子謳荷花十里桂三秋那知卉木無情物牽動長江萬里愁余謂此詞雖牽動長江之愁然湖山之清麗使士夫流連於歌舞嬉遊之樂遂忘中原是則深可恨耳因和其詩云缺快劍是清謳牛渚依然一片秋却恨荷花留玉輦竟忘烟柳汴宫愁蓋靖康之亂有題詩於舊京宫墻云依依烟柳拂宫墻宫殿無人春晝長仁和門宋太祖次陳橋驛整軍從仁和門入髙宗由海道過杭聞縣名仁和甚喜曰此京師門名也駐蹕之意始此髙宗定都髙宗自建炎元年五月即位於南京嶽飛解東京圍宗澤留守東京勸上還京髙宗雖下詔修京城而還京之意終未决車駕行幸未有定向李綱諫曰今嶽飛縱未入關當適鄧襄以示不忘中原之意近聞一二執政勸陛下遷幸東南果爾則中原非我有矣冬十一月上如揚州至三年金人犯揚州髙宗始離揚凡在揚州一十六個月三年二月上如杭州以州治為行宫至四月幸建康在杭州凡四個月六月髙宗離建康幸浙西詔改杭州為臨安府十月金人犯杭上自明州航海四年正月上次台州章安鎮四月上次明州八月上次越州紹興二年正月上自越州如臨安三年上在臨安四年上在臨安冬十月詔親征上如平江五年二月上自平江如臨安六年上在臨安七年春正月上在平江八年上在建康二月如臨安遂定都焉顯慶寺臨安靈隱净慈上中下三天竺寺皆宋朝祖宗功德寺也淳祐庚戌為貴妃閻氏建功德寺於九里松近靈隱寺前名顯慶寺土木之工過於諸寺時人名之曰賽靈隱寺成建大鼓於法堂忽有人掩入不備大書鼓上云净慈靈隱三天竺不似閻妃兩片皮由此界限甚嚴無故者不得復入矣遊湖詞蜀人文及翁登第後期集遊西湖一同年戲之曰西蜀有此景否及翁即席賦賀新郎云一勺西湖水渡江來百年歌舞百年酣醉回首洛陽花世界烟渺黍離之地更不復新亭墮淚簇樂紅粧搖畫艇問中流擊楫何人是千古恨幾時洗余生自負澄清志更有誰磻溪未遇傅岩未起國事如今誰倚仗衣帶一江而已便都道江神堪恃借問孤山林處士但掉頭笑指梅花蘂天下事可知矣三賢堂寶慶丙戌袁樵尹京於三賢堂賣酒或題詩云和靖東坡白樂天三人秋菊薦寒泉而今滿靣生塵土却與袁樵趂酒錢冷泉亭冷泉亭正在靈隱寺之前一泓極為清泚流出飛來峰下過九里松而入西湖或題詩云一泓清可浸詩脾冷暖人情秖自知流出西湖載歌舞回頭不似在山時三天竺上中下天竺三寺相連其山門與靈隱共入扁曰靈隱天竺之門惟上天竺係觀音坐正殿敕賜號靈感臨安祈禱則迎奉之有勑賜寶厨頂鉗諸寶飾其上有兩珠一赤一白名日月珠又有白黑相間如棗核樣名鬼谷珠又一大珠名珠母又一大珠名猫兒眼睛每遇迎奉則如此飾亦曽迎入大內祈禱焉題白塔橋白塔橋邊賣地經長程短堠甚分明如何只到臨安住不說中原有幾程伍子胥廟廟在吳山頭其下當御路名朝天門理宗辛卯廟遭回祿後賜緡錢二萬三千重建舊址殿講陳公益作記其略曰吳山廟者春秋伍大夫廟也春秋伍氏子世為楚忠臣大夫挾父兄不報之讐去國千里倣徨江上漁父不受萬鍾之祿以捐其軀瀨水女子不吝千金之身為效其死故能識要離之勇薦孫子之智借吳師以入郢㑹諸侯於漢水功亦偉矣及夫差狠愎踴躍用兵貪攘東齊受賂仇越大夫不忍見吳之為池沼蘇臺之遊麋鹿竟以直死當時知與不知莫不哀之因名其山而立祠焉君子曰伍大夫於是忠孝兩全矣大夫以抑鬱不平之氣隨流揚波依潮來往猶能激為疾風甚雨奔雷激電震蕩於越兵入城之頃其與荆軻慕義白虹貫日孔明英氣能為風雲者何以異哉自春秋至皇宋千有餘年景象相傳理宗賜額忠清又建閣於門之上御書英衛之閣以扁之每嵗春秋醮祭命學士院降付青詞寶祐癸丑再火而此碑亦不存矣謂金石之文終久不磨亦無是理也射潮箭五代錢王射潮箭在臨安府候潮門左手數步昔江潮每衝激城下錢氏以壯士數百人候潮之至以强弩射之由此潮頭退避後遂以鐵鑄成箭樣其大如稱作亭泥路之傍埋箭亭中出土外猶七尺許以示鎮壓之義然潮汛之來常失故道臨安府置一司名修江司焉蘇堤趙堤東坡守杭日築堤自大佛頭直至净慈寺前非為遊觀計也遏水之深者為湖而沮洳之地畝以萬計皆可為田淳祐間趙與􅊸尹京橫築一堤祇是通路過靈隱而已六和塔詩李彊父為昭文相嘗登六和塔題詩云往來塔下幾經秋每恨無從到上頭今日登臨方覺險不如歸去卧林丘彊父為相清正謹守規矩自奉如寒士書卷不釋手薨於位諡文清淨慈寺羅漢净慈寺乃祖宗功德院側有五百羅漢别創一田字殿安頓裝塑雄偉殿中有千手眼觀音一位尤精緻其第四百四十二位阿濕毗尊者獨設一龕用黃羅幕之旁致籖筒其羅漢像則偃蹇便腹斜目覷人而笑臨安婦人祈嗣者必詣此炷香默禱以手摩其腹云有感應積日既久羣手加於泥粉之上其腹黑光可鑒邪說誣民如此哉又假此為抄題二字未詳疑有誤之端裒斂民財尤不可勝計其無忌憚甚矣萬回哥哥臨安居民不祀祖先惟每歲臘月二十四日各家臨期書寫祖先及亡者名號作羮飯供養罷即以名號就楮錢上焚化至來年此日復然惟萬回哥哥者不問省部吏曹市肆買賣及娼妓之家無不奉祀每一飯必祭其像蓬頭笑面身著綵衣左手擎鼓右手執棒云是和合之神祀之可使人在萬里外亦能回家故名萬回隆興鐵柱觀側武當福地觀內殿右亦祠之未知果為淫祠否乎龍翔宫淳祐甲辰理宗建龍翔宫於中瓦後徹居民屋宇三之二奉祀感生帝君如昭符之門正陽之殿和樂之閣琅函寶藏皆係御書每孟享車駕由御街過中瓦前直下景靈宫駕回則自灞頭橫入過龍翔歸則自太平坊出至御街寶祐癸丑臘月中瓦回祿因此自御街當中取大路直入而中瓦之右以為武林園其左以為皇子忠王看望樓旅邸有題曰龍翔宫闕壯皇都鸞路縈回枉德車天意也知明主意故教劫火闢通衢浙江十廟廟在浙江之境其一是平水九州大禹王其一是陸相公陸有三位小娘子皆緑袍方巾列坐兩傍一主護岸一主起水一主交澤各有司存凡海船到廟下必先詣三位小娘子前炷香上真綵及花朵粉盒拜許保安牲酒心願其或欲乘蚤晚潮汛之至而發舟必須得卜而動則前去免風濤之險不得卜則斷不敢輕發也廟傍别有一所專祀十二位潮神各武裝持杖每位各主一時焉然皆不及三位小娘子香火之盛孝宗問卜淳熙中金人南向人言洶洶上於禁中默禱遣中使如平江問何蓑衣其說無有知者何見其來曰我已知得中使炷香如禮何曰我不能書可令人寫遂授以詩云賀新郎胡孫拖白不終場英雄裂土封侯王又云閙啾啾也須還我一百州中使持歸以奏時人莫諭其㫖益公日記中亦載大理寺豕祭舊傳三嵗拜郊或明堂大禮凡在前誤國奸臣首級在理寺者必以豕祭蓋訛傳謂以穢物祭之其實豕者少牢也國家三嵗恩霈汝雖誤國然亦不忘汝之舊時用豕以祭而謬傳乃若此豈朝廷寬大之恩哉格天閣秦檜靖康初為御史中丞金人立張邦昌檜陳議狀大略謂趙氏傳緒百七十年號令一統綿地萬里子孫蕃衍布在四海德澤深長百姓歸心止緣奸臣誤國遂至喪師失守豈可以一城而决廢立哉若必欲舍趙氏而立邦昌則京師之民可服而天下之民不可服京師之宗子可滅而天下宗子不可滅望稽古揆今復我君之位以安宋國敵人嘉其忠與之俱歸遂諂事撻懶隂遣檜歸為反間遂决意主和檜之姦賊不臣其罪可勝誅哉方其在相位也建一德格天之閣有朝士賀以啓云我聞在昔惟伊尹格於皇天民到於今微管仲吾其左祍檜大喜超擢之又有選人投詩云多少儒生新及第髙燒銀燭照蛾眉格天閣上三更雨猶誦車攻復古詩檜益喜即與改秩蓋其胸中有慊故特喜此諛語以為掩覆之計真猾夏之賊也錢塘遺事卷一
